blueprint:
  name: PI-Regler
  description: >
    Ein reines Rechen-Script. Erwartet alle Entitäten und Werte als Variablen
    beim Aufruf aus einer Automatisierung.
    ac_charge_mode = true: invertierte Fehlerberechnung für AC-Laden (raw_error = target_offset - grid).
    ac_charge_mode = false (Standard): normale Fehlerberechnung (raw_error = grid - target_offset).
    error_share (0.0-1.0): skaliert raw_error auf den Anteil dieser Instanz. Standard = 1.0.
  domain: script
  source_url: https://raw.githubusercontent.com/D4nte85/Solakon-One-Nulleinspeisung-Blueprint-homeassistant/main/PI-Regler.yaml

mode: single

fields:
  grid_power:
    name: Netzleistung (Watt)
    description: Aktueller Wert vom Stromzähler
  current_power:
    name: Aktuelle WR-Leistung (Watt)
    description: Derzeitiger Output des Wechselrichters
  target_offset:
    name: Sollwert (Watt)
    description: Ziel-Netzbezug
  max_power:
    name: Max Leistung (Watt)
    description: Limit des Wechselrichters (Hard Limit oder Lade-Limit)
  tolerance:
    name: Toleranz (Watt)
    description: Totband, in dem nicht geregelt wird
  p_factor:
    name: P-Faktor
  i_factor:
    name: I-Faktor
  integral_entity:
    name: Integral-Helfer (ID)
    description: Die Entitäts-ID des input_number Helfers
  output_entity:
    name: Ziel-Entität (ID)
    description: Die Entitäts-ID der Ausgangsleistungs-Entität des Wechselrichters
  ac_charge_mode:
    name: AC Laden aktiv (Bool)
    description: >
      Bestimmt die Vorzeichen-Richtung des Basisfehlers (vor error_share-Skalierung).
      true  = AC Laden: Basis = target_offset − grid (Positiver Fehler → Ladeleistung erhöhen).
      false = Normal:   Basis = grid − target_offset (Positiver Fehler → Output erhöhen).
    required: false
    default: false

  error_share:
    name: Fehler-Anteil (0.0–1.0)
    description: >
      Anteil des Netzfehlers, den diese Instanz übernimmt (Multi-Instanz-Betrieb).
      Im Einzelbetrieb nicht setzen — Standard = 1.0 (voller Fehler).
    required: false
    default: 1.0

variables:
  grid_float: "{{ states(grid_power) | float(0) }}"
  current_float: "{{ current_power | float(0) }}"
  target_float: "{{ target_offset | float(0) }}"
  max_pwr_float: "{{ max_power | float(800) }}"
  tol_float: "{{ tolerance | float(10) }}"
  p_val: "{{ p_factor | float(1.5) }}"
  i_val: "{{ i_factor | float(0.05) }}"

  # Fehlerrichtung je nach Modus:
  #   Normal:    grid - target  → positiv bei Netzbezug (Output erhöhen)
  #   AC Laden:  target - grid  → positiv wenn Grid < Sollwert (Ladeleistung erhöhen)
  # error_share skaliert den Fehler auf den Anteil dieser Instanz (Multi-Instanz).
  raw_error: >
    {% set base = (target_float - grid_float) if ac_charge_mode | bool(false) else (grid_float - target_float) %}
    {{ base * (error_share | float(1.0)) }}
  grid_error_abs: "{{ raw_error | abs }}"

  # Kapazitäts-Clamping: begrenzt Fehler auf tatsächlich nutzbare Kapazität
  error_float: >
    {% if raw_error > 0 %}
      {{ [raw_error, (max_pwr_float - current_float)] | min }}
    {% else %}
      {{ [raw_error, (0 - current_float)] | max }}
    {% endif %}

  # Integral mit Anti-Windup
  integral_old: "{{ states(integral_entity) | float(0) }}"
  integral_new: "{{ (integral_old + error_float) | float(0) | clamp(-1000, 1000) }}"

  # Hardware-Max der Ziel-Entität (Fallback: max_pwr_float wenn Attribut fehlt)
  entity_max: "{{ state_attr(output_entity, 'max') | float(max_pwr_float) }}"
  effective_max: "{{ [max_pwr_float, entity_max] | min }}"

  # PI-Korrektur und Endergebnis
  power_correction: "{{ (error_float * p_val) + (integral_new * i_val) }}"
  final_power: "{{ (current_float + power_correction) | float(0) | round(0) | clamp(0, effective_max) }}"

sequence:
  - parallel:
      # 1. Integral immer aktualisieren
      - action: input_number.set_value
        target:
          entity_id: "{{ integral_entity }}"
        data:
          value: "{{ integral_new }}"

      # 2. Wert an die übergebene Entität senden
      - action: number.set_value
        target:
          entity_id: "{{ output_entity }}"
        data:
          value: "{{ final_power }}"
