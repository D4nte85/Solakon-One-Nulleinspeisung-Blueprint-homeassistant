blueprint:
  name: "Solakon Power Distribution (Multi-Instancing)"
  description: >-
    Distributes output power and grid-error share adaptively across 2-4 Solakon Zero-Export instances.
    Active instances detected via mode '1' (INV Discharge PV Priority).
    Distribution via toggle: equal split or SOC-weighted (usable capacity).
    Weighting based on usable energy: (SOC - Min-SOC) / 100 x capacity_kWh per instance.
    Without capacity sensor: capacity = 100 — weighting by SOC percentage points.
    Each instance receives a share proportional to its usable energy —
    both for the power limit and for the grid-error share (error_share).
    Execution interval: trigger every 10 s, interval controlled via last_updated of share entity (instance 1).
    Prerequisite per instance: one input_number each for max. output power and error share
    (0.0-1.0), plus the configured min-SOC (Zone 3 stop) of the respective instance.
    Unconfigured optional instances (3/4) are safely skipped —
    states() call only for active instances with a valid sensor string.
  domain: automation
  source_url: https://raw.githubusercontent.com/D4nte85/Solakon-One-Nulleinspeisung-Blueprint-homeassistant/Solakon-ONE-Zero-Export/solakon_power_distribution.yaml
  input:

    # ═══════════════════════════════════════════════════════════════════════
    # 🌐 GLOBAL SETTINGS
    # ═══════════════════════════════════════════════════════════════════════
    global_settings:
      name: "🌐 GLOBAL SETTINGS"
      collapsed: false
      input:

        global_max_power:
          name: ⚡ Total Max. Output Power
          description: |
            Absolute ceiling for all instances combined.
            Split according to weights. Must not exceed the physical inverter limit.
          default: 800
          selector:
            number:
              min: 0
              max: 800
              step: 10
              unit_of_measurement: W

        interval_seconds:
          name: ⏱️ Update Interval
          description: |
            How often the power distribution is calculated and written.
            Internally: trigger every 10 s, execution controlled by elapsed-time check — no helper needed.
          default: "30"
          selector:
            select:
              options:
                - label: "10 seconds"
                  value: "10"
                - label: "30 seconds (recommended)"
                  value: "30"
                - label: "60 seconds"
                  value: "60"
                - label: "120 seconds"
                  value: "120"
                - label: "300 seconds"
                  value: "300"

    # ═══════════════════════════════════════════════════════════════════════
    # ⚖️ DISTRIBUTION MODE
    # ═══════════════════════════════════════════════════════════════════════
    weighting_settings:
      name: "⚖️ DISTRIBUTION MODE"
      collapsed: false
      input:

        equal_distribution:
          name: ⚖️ Enable Equal Distribution
          description: |
            On  → All active instances receive equal power.
            Off → SOC-weighted distribution: instance with more usable
                  capacity (SOC − Min-SOC) takes more load.
                  SOC values equalise automatically.
          default: true
          selector:
            boolean:

    # ═══════════════════════════════════════════════════════════════════════
    # 🔋 INSTANCE 1 (REQUIRED)
    # ═══════════════════════════════════════════════════════════════════════
    instance1_settings:
      name: "🔋 INSTANCE 1 (REQUIRED)"
      collapsed: false
      input:

        inst1_mode_select:
          name: 🔄 Instance 1 — Operation Mode Select
          description: |
            Mode select of the first Solakon instance.
            Instance is considered active when mode = '1' (INV Discharge PV Priority).
          selector:
            entity:
              domain: select

        inst1_soc_sensor:
          name: 🔋 Instance 1 — SOC Sensor
          description: Battery state of charge in % — drives SOC weighting.
          selector:
            entity:
              domain: sensor
              device_class: battery

        inst1_min_soc:
          name: 🔋 Instance 1 — Min SOC (Zone 3 Stop)
          description: |
            Lower SOC threshold from the instance's blueprint settings.
            Used to calculate usable capacity:
            usable = SOC − Min-SOC (only the range above the minimum counts).
          default: 20
          selector:
            number:
              min: 0
              max: 49
              unit_of_measurement: "%"

        inst1_capacity_sensor:
          name: 🔋 Instance 1 — Battery Capacity in kWh (Optional)
          description: |
            Capacity sensor from the Solakon ONE integration: sensor.solakon_one_battery_capacity
            Optional: improves weighting when instances have batteries of different capacity.
            Without entry: weighting purely by SOC percentage points (equal capacity assumed).
            ⚠️ Either set for all instances or for none.
          default: {}
          selector:
            entity:
              domain: sensor

        inst1_limit_number:
          name: ⚙️ Instance 1 — Max. Power (input_number)
          description: |
            The input_number entity the allocated power is written to.
            ⚠️ Must be entered in the instance automation as "Max. Output Power — Dynamic".
            Settings: min: 0, max: ≥ Global Max, step: 1.
          selector:
            entity:
              domain: input_number

        inst1_share_number:
          name: ⚖️ Instance 1 — Error Share Helper (input_number)
          description: |
            input_number entity the calculated error share (0.0–1.0) is written to.
            ⚠️ Must be entered in the instance automation as "Error Share Helper".
            Settings: min: 0, max: 1, step: 0.01.
          selector:
            entity:
              domain: input_number

    # ═══════════════════════════════════════════════════════════════════════
    # 🔋 INSTANCE 2 (REQUIRED)
    # ═══════════════════════════════════════════════════════════════════════
    instance2_settings:
      name: "🔋 INSTANCE 2 (REQUIRED)"
      collapsed: false
      input:

        inst2_mode_select:
          name: 🔄 Instance 2 — Operation Mode Select
          selector:
            entity:
              domain: select

        inst2_soc_sensor:
          name: 🔋 Instance 2 — SOC Sensor
          selector:
            entity:
              domain: sensor
              device_class: battery

        inst2_min_soc:
          name: 🔋 Instance 2 — Min SOC (Zone 3 Stop)
          default: 20
          selector:
            number:
              min: 0
              max: 49
              unit_of_measurement: "%"

        inst2_capacity_sensor:
          name: 🔋 Instance 2 — Battery Capacity in kWh (Optional)
          description: See Instance 1 — capacity sensor from the Solakon ONE integration.
          default: {}
          selector:
            entity:
              domain: sensor

        inst2_limit_number:
          name: ⚙️ Instance 2 — Max. Power (input_number)
          selector:
            entity:
              domain: input_number

        inst2_share_number:
          name: ⚖️ Instance 2 — Error Share Helper (input_number)
          selector:
            entity:
              domain: input_number

    # ═══════════════════════════════════════════════════════════════════════
    # 🔋 INSTANCE 3 (Optional)
    # ═══════════════════════════════════════════════════════════════════════
    instance3_settings:
      name: "🔋 INSTANCE 3 (Optional — leave empty if not used)"
      collapsed: true
      input:

        inst3_mode_select:
          name: 🔄 Instance 3 — Operation Mode Select
          default: {}
          selector:
            entity:
              domain: select

        inst3_soc_sensor:
          name: 🔋 Instance 3 — SOC Sensor
          default: {}
          selector:
            entity:
              domain: sensor
              device_class: battery

        inst3_min_soc:
          name: 🔋 Instance 3 — Min SOC (Zone 3 Stop)
          default: 20
          selector:
            number:
              min: 0
              max: 49
              unit_of_measurement: "%"

        inst3_capacity_sensor:
          name: 🔋 Instance 3 — Battery Capacity in kWh (Optional)
          description: See Instance 1 — capacity sensor from the Solakon ONE integration.
          default: {}
          selector:
            entity:
              domain: sensor

        inst3_limit_number:
          name: ⚙️ Instance 3 — Max. Power (input_number)
          default: {}
          selector:
            entity:
              domain: input_number

        inst3_share_number:
          name: ⚖️ Instance 3 — Error Share Helper (input_number)
          default: {}
          selector:
            entity:
              domain: input_number

    # ═══════════════════════════════════════════════════════════════════════
    # 🔋 INSTANCE 4 (Optional)
    # ═══════════════════════════════════════════════════════════════════════
    instance4_settings:
      name: "🔋 INSTANCE 4 (Optional — leave empty if not used)"
      collapsed: true
      input:

        inst4_mode_select:
          name: 🔄 Instance 4 — Operation Mode Select
          default: {}
          selector:
            entity:
              domain: select

        inst4_soc_sensor:
          name: 🔋 Instance 4 — SOC Sensor
          default: {}
          selector:
            entity:
              domain: sensor
              device_class: battery

        inst4_min_soc:
          name: 🔋 Instance 4 — Min SOC (Zone 3 Stop)
          default: 20
          selector:
            number:
              min: 0
              max: 49
              unit_of_measurement: "%"

        inst4_capacity_sensor:
          name: 🔋 Instance 4 — Battery Capacity in kWh (Optional)
          description: See Instance 1 — capacity sensor from the Solakon ONE integration.
          default: {}
          selector:
            entity:
              domain: sensor

        inst4_limit_number:
          name: ⚙️ Instance 4 — Max. Power (input_number)
          default: {}
          selector:
            entity:
              domain: input_number

        inst4_share_number:
          name: ⚖️ Instance 4 — Error Share Helper (input_number)
          default: {}
          selector:
            entity:
              domain: input_number


# ═══════════════════════════════════════════════════════════════════════════
# AUTOMATION
# ═══════════════════════════════════════════════════════════════════════════

mode: single
max_exceeded: silent

variables:
  global_max:    !input global_max_power
  interval_s:    !input interval_seconds
  equal_dist:    !input equal_distribution
  i1_mode:       !input inst1_mode_select
  i1_soc:        !input inst1_soc_sensor
  i1_limit:      !input inst1_limit_number
  i1_share:      !input inst1_share_number
  i1_min_soc:    !input inst1_min_soc
  i1_cap:        !input inst1_capacity_sensor
  i2_mode:       !input inst2_mode_select
  i2_soc:        !input inst2_soc_sensor
  i2_limit:      !input inst2_limit_number
  i2_share:      !input inst2_share_number
  i2_min_soc:    !input inst2_min_soc
  i2_cap:        !input inst2_capacity_sensor
  i3_mode:       !input inst3_mode_select
  i3_soc:        !input inst3_soc_sensor
  i3_limit:      !input inst3_limit_number
  i3_share:      !input inst3_share_number
  i3_min_soc:    !input inst3_min_soc
  i3_cap:        !input inst3_capacity_sensor
  i4_mode:       !input inst4_mode_select
  i4_soc:        !input inst4_soc_sensor
  i4_limit:      !input inst4_limit_number
  i4_share:      !input inst4_share_number
  i4_min_soc:    !input inst4_min_soc
  i4_cap:        !input inst4_capacity_sensor

triggers:
  # Trigger every 10 seconds — last_updated comparison in the first condition
  # controls the configurable effective interval without an extra helper.
  - trigger: time_pattern
    seconds: "/10"

actions:
  # ── Interval check ────────────────────────────────────────────────────────
  # Execute only if at least 'interval_s' seconds have elapsed since the last
  # successful run. last_updated of the instance-1 share entity serves as an
  # implicit timestamp — this entity is written exclusively by this automation,
  # not by the main automation (which writes i1_limit).
  - condition: template
    value_template: >
      {% set last_ts = states[i1_share].last_updated | as_timestamp(0) %}
      {{ (as_timestamp(now()) - last_ts) >= (interval_s | int(30)) }}

  # ── Calculate values ──────────────────────────────────────────────────────
  - variables:
      # Optional instances: configured when mode, limit and share are all set
      i3_configured: >
        {{ i3_mode is string and i3_mode | length > 0
           and i3_limit is string and i3_limit | length > 0
           and i3_share is string and i3_share | length > 0 }}
      i4_configured: >
        {{ i4_mode is string and i4_mode | length > 0
           and i4_limit is string and i4_limit | length > 0
           and i4_share is string and i4_share | length > 0 }}

      # Active status: mode '1' = INV Discharge PV Priority = zero-export running
      i1_active: "{{ states(i1_mode) == '1' }}"
      i2_active: "{{ states(i2_mode) == '1' }}"
      i3_active: "{{ i3_configured and states(i3_mode) == '1' }}"
      i4_active: "{{ i4_configured and states(i4_mode) == '1' }}"

      # Capacity sensors (default 100.0 → weighting by SOC percentage points if not set)
      i1_cap_valid: "{{ i1_cap is string and i1_cap | length > 0 }}"
      i2_cap_valid: "{{ i2_cap is string and i2_cap | length > 0 }}"
      i3_cap_valid: "{{ i3_cap is string and i3_cap | length > 0 }}"
      i4_cap_valid: "{{ i4_cap is string and i4_cap | length > 0 }}"
      cap1: "{{ states(i1_cap) | float(100.0) if i1_cap_valid else 100.0 }}"
      cap2: "{{ states(i2_cap) | float(100.0) if i2_cap_valid else 100.0 }}"
      cap3: "{{ states(i3_cap) | float(100.0) if i3_cap_valid else 100.0 }}"
      cap4: "{{ states(i4_cap) | float(100.0) if i4_cap_valid else 100.0 }}"

      # Usable energy per instance = (SOC − Min-SOC) / 100 × capacity_kWh
      # Inactive instances receive 0 → no weight.
      soc1: >
        {% set usable = [states(i1_soc) | float(0) - i1_min_soc | float(0), 0] | max %}
        {{ (usable / 100 * cap1) if i1_active else 0 }}
      soc2: >
        {% set usable = [states(i2_soc) | float(0) - i2_min_soc | float(0), 0] | max %}
        {{ (usable / 100 * cap2) if i2_active else 0 }}
      soc3: >
        {% if i3_active and i3_soc is string and i3_soc | length > 0 %}
          {% set usable = [states(i3_soc) | float(0) - i3_min_soc | float(0), 0] | max %}
          {{ usable / 100 * cap3 }}
        {% else %}
          {{ 0 }}
        {% endif %}
      soc4: >
        {% if i4_active and i4_soc is string and i4_soc | length > 0 %}
          {% set usable = [states(i4_soc) | float(0) - i4_min_soc | float(0), 0] | max %}
          {{ usable / 100 * cap4 }}
        {% else %}
          {{ 0 }}
        {% endif %}

      # Number of active instances
      active_count: >
        {{ [i1_active, i2_active, i3_active, i4_active]
           | select('equalto', true) | list | count }}

      # total_soc = sum of usable capacities (SOC − Min-SOC, inactive = 0).
      # Used as denominator for weight calculation (proportional share).
      total_soc: "{{ soc1 + soc2 + soc3 + soc4 }}"

      total_power: "{{ global_max | int }}"

      # Weights (w1–w4) simultaneously determine:
      #   a) Power distribution: power_i = total_power × w_i
      #   b) Error share:        error_share_i = w_i → fed directly into instance PI controller
      # Equal:        1/n for all active instances
      # SOC-weighted: usable capacity (SOC − Min-SOC) / Σ usable capacity
      #               → instance with more usable capacity takes more load
      #               → SOC values equalise automatically
      w1: >
        {% if not i1_active or active_count | int(0) == 0 %}{{ 0.0 }}
        {% elif equal_dist %}{{ 1.0 / active_count }}
        {% else %}
          {% set eq = 1.0 / active_count %}
          {{ soc1 / total_soc if total_soc > 0 else eq }}
        {% endif %}
      w2: >
        {% if not i2_active or active_count | int(0) == 0 %}{{ 0.0 }}
        {% elif equal_dist %}{{ 1.0 / active_count }}
        {% else %}
          {% set eq = 1.0 / active_count %}
          {{ soc2 / total_soc if total_soc > 0 else eq }}
        {% endif %}
      w3: >
        {% if not i3_active or active_count | int(0) == 0 %}{{ 0.0 }}
        {% elif equal_dist %}{{ 1.0 / active_count }}
        {% else %}
          {% set eq = 1.0 / active_count %}
          {{ soc3 / total_soc if total_soc > 0 else eq }}
        {% endif %}
      w4: >
        {% if not i4_active or active_count | int(0) == 0 %}{{ 0.0 }}
        {% elif equal_dist %}{{ 1.0 / active_count }}
        {% else %}
          {% set eq = 1.0 / active_count %}
          {{ soc4 / total_soc if total_soc > 0 else eq }}
        {% endif %}

      # Allocated power per instance (rounded to whole watts)
      power1: "{{ (total_power * w1 | float(0)) | round(0) | int }}"
      power2: "{{ (total_power * w2 | float(0)) | round(0) | int }}"
      power3: "{{ (total_power * w3 | float(0)) | round(0) | int }}"
      power4: "{{ (total_power * w4 | float(0)) | round(0) | int }}"

      # Write value: active instance → calculated power
      #              inactive instance → Global Max as safe fallback
      #              (inactive = mode '0' or '3'; limit has no effect there)
      limit1: "{{ power1 if i1_active else global_max | int }}"
      limit2: "{{ power2 if i2_active else global_max | int }}"
      limit3: "{{ power3 if i3_active else global_max | int }}"
      limit4: "{{ power4 if i4_active else global_max | int }}"

  # ── Write ─────────────────────────────────────────────────────────────────

  # Instance 1 (always present) — power limit and error share
  - action: input_number.set_value
    target:
      entity_id: !input inst1_limit_number
    data:
      value: "{{ limit1 }}"
  - action: input_number.set_value
    target:
      entity_id: !input inst1_share_number
    data:
      value: "{{ w1 | round(3) }}"

  # Instance 2 (always present) — power limit and error share
  - action: input_number.set_value
    target:
      entity_id: !input inst2_limit_number
    data:
      value: "{{ limit2 }}"
  - action: input_number.set_value
    target:
      entity_id: !input inst2_share_number
    data:
      value: "{{ w2 | round(3) }}"

  # Instance 3 (only when configured) — power limit and error share
  - if:
      - condition: template
        value_template: "{{ i3_configured }}"
    then:
      - action: input_number.set_value
        target:
          entity_id: "{{ i3_limit }}"
        data:
          value: "{{ limit3 }}"
      - action: input_number.set_value
        target:
          entity_id: "{{ i3_share }}"
        data:
          value: "{{ w3 | round(3) }}"

  # Instance 4 (only when configured) — power limit and error share
  - if:
      - condition: template
        value_template: "{{ i4_configured }}"
    then:
      - action: input_number.set_value
        target:
          entity_id: "{{ i4_limit }}"
        data:
          value: "{{ limit4 }}"
      - action: input_number.set_value
        target:
          entity_id: "{{ i4_share }}"
        data:
          value: "{{ w4 | round(3) }}"
