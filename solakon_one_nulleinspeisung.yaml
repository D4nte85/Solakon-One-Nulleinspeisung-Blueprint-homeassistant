blueprint:
  name: Solakon ONE Nulleinspeisung (DE) - Dynamisch & SOC-Gesteuert (V303)
  description: |
    Dynamische Nulleinspeisung für den Solakon ONE Wechselrichter mit PI-Regler, SOC-Zonenlogik,
    optionaler Überschuss-Einspeisung, optionalem AC Laden aus externer Einspeisung und
    optionaler Tarif-Arbitrage (günstig laden, Entladesperre bei günstigem/neutralem Tarif).

    <details>
    <summary><b>🧠 PI-Regler & Steuerlogik</b> 👈</summary>

    Der Kern des Blueprints ist ein PI-Regler, der das AC-Output-Limit dynamisch anpasst.
    Die Rechenlogik ist in ein separates Script-Blueprint (`PI-Regler`) ausgelagert.

    - **Regelgröße:** Netzleistung (Shelly/Stromzähler). Positiv = Bezug, negativ = Einspeisung.
    - **Stellgröße:** AC-Ausgangsleistung des Wechselrichters.
    - **P-Anteil:** Reagiert sofort auf die aktuelle Abweichung vom Sollwert.
    - **I-Anteil:** Summiert Abweichungen über die Zeit auf — eliminiert bleibende Regelabweichungen.
    - **Anti-Windup:** Integral wird auf ±1000 begrenzt (im Script).
    - **Integral-Reset:** Bei jedem Zonenwechsel auf 0.
    - **Integral-Decay:** 5 % Abbau pro Zyklus solange Fehler ≤ Toleranz und |Integral| > 10 (in Hauptautomatisierung).
    - **Integral-Einfrieren:** In Zone 0 (Überschuss) kein Decay, kein PI-Aufruf.
    - **Fehlerberechnung (modusabhängig, im Script):**
      - Normal (`ac_charge_mode=false`): `raw_error = grid − target_offset`
      - AC Laden (`ac_charge_mode=true`): `raw_error = target_offset − grid` (invertiert)
    - **Kapazitäts-Clamping:** Fehler wird auf tatsächlich verfügbare Kapazität begrenzt.
    - **Dynamisches Power-Limit (`max_power` ans Script):**
      - Zone 1: Hard Limit
      - Zone 2: `Max(0, PV − Reserve)`
      - AC Laden (Modus `'3'`): konfigurierbares Lade-Limit
    - **PI-Aufruf-Guard:**
      - Zone 0 aktiv → kein PI-Aufruf, Integral eingefroren
      - Tarif-Laden aktiv → direkt `tariff_charge_power` setzen, kein PI
      - AC Laden aktiv → PI mit `ac_charge_mode=true`, `at_max/at_min`-Guards deaktiviert
      - Normal → PI nur wenn `|Fehler| > Toleranz` UND kein At-Limit
    - **Separate P/I-Faktoren für AC Laden:** Wegen langer Hardware-Flanke (~25 s) empfiehlt sich ein kleiner P-Faktor (~0.3–0.5); der I-Anteil macht die eigentliche Regelarbeit.

    </details>

    <details>
    <summary><b>🔋 SOC-Zonenlogik</b> 👈</summary>

    | Zone | Bedingung | Modus | Entladestrom | Besonderheit |
    |:-----|:----------|:------|:------------|:-------------|
    | **0 — Überschuss** | SOC ≥ Export-Schwelle UND PV > Output + Grid + PV-Hysterese | `'1'` | 2 A | Optional. Integral eingefroren. |
    | **1 — Aggressiv** | SOC > Zone-1-Schwelle | `'1'` | Max (z.B. 40 A) | Läuft bis SOC ≤ Zone-3-Schwelle. Auch nachts aktiv. |
    | **2 — Batterieschonend** | Zone-3 < SOC ≤ Zone-1, Zyklus = off | `'1'` | 0 A | Dynamisches Limit: `Max(0, PV − Reserve)`. Optional: Nachtabschaltung. |
    | **3 — Sicherheitsstopp** | SOC ≤ Zone-3-Schwelle | `'0'` | 0 A | Output = 0 W. Vollständiger Batterieschutz. Absoluter Vorrang. |

    </details>

    <details>
    <summary><b>⚡ Priorität der optionalen Module</b> 👈</summary>

    Die optionalen Module überschreiben die SOC-Zonen-Logik in folgender Reihenfolge:

    **1. Zone 3 — absoluter Vorrang**
    SOC-Schutz greift immer, unabhängig von allen anderen Modi.

    **2. Zone 0 — Überschuss-Einspeisung (höchste optionale Priorität)**
    Blockiert den Eintritt in Tarif-Laden (Fall GT) und AC-Laden (Fall G) solange aktiv.
    Zone 0 kann nur starten wenn kein Ladevorgang aktiv ist.

    **3. Tarif-Laden (Fall GT) — Vorrang vor AC-Laden**
    Startet nur wenn Zone 0 NICHT aktiv ist.
    Sperrt Zone 1 und Zone 2: Entladesperre (TM) gilt für alles unterhalb der Teuer-Schwelle.
    Für die mittlere Preiszone (günstig ≤ Preis < teuer) wird laufende Entladung (Zone 1 und Zone 2)
    gestoppt (Fall TM) und der Akku passiv gehalten. Zone 1 wird dabei wie Zone 2 beendet — der Zyklus
    wird zurückgesetzt; beim nächsten teuren Tarif starten Falls A/E neu.

    **4. AC-Laden (Fall G) — nach Tarif-Laden**
    Startet nur wenn weder Zone 0 noch Tarif-Laden aktiv ist.
    Ebenfalls durch Überschuss-Einspeisung blockiert.

    **5. SOC-Zonen (Falls A/E) — normale Entladung**
    Starten nur wenn keine der obigen Prioritäten greift und die Entladesperre (Preis < teuer)
    nicht aktiv ist.

    **Zusammenfassung:**
    ```
    Zone 3 (Sicherheit) > Zone 0 (Überschuss) > Tarif-Laden > AC-Laden > SOC-Zonen
    ```

    </details>

    <details>
    <summary><b>💹 Tarif-Arbitrage (Tibber, aWATTar …)</b> 👈</summary>

    Drei Preisstufen:

    | Preis | Verhalten |
    |:------|:----------|
    | `Preis < günstig_threshold` | Tarif-Laden (GT) + Entladesperre. Zone 1/2 werden gestoppt. |
    | `günstig ≤ Preis < teuer_threshold` | Nur Entladesperre (TM): laufende Zone 1 **und** Zone 2 werden gestoppt. Akku passiv. |
    | `Preis ≥ teuer_threshold` | Normale SOC-Zonenlogik. Kein Eingriff. |

    - **Fallback bei Sensor unavailable:** weder Laden noch Sperre — System wie ohne Tarif.
    - **Tarif-Laden kein PI:** direkt konfigurierte Ladeleistung, kein Toleranz-Check.
    - Tarif-Laden und AC-Laden sind voneinander unabhängige Module.

    </details>

    <details>
    <summary><b>☀️ Überschuss-Einspeisung (Zone 0)</b> 👈</summary>

    - **Eintritt:** SOC ≥ Export-Schwelle UND (PV > Output + Grid + PV-Hysterese ODER PV = 0)
    - **Austritt:** SOC < (Export-Schwelle − SOC-Hysterese) ODER PV ≤ (Output + Grid − PV-Hysterese)
    - **Verhalten:** Output → Hard Limit, Entladestrom 2 A (Stabilitätspuffer), Integral eingefroren.
    - **Blockiert:** Tarif-Laden (GT) und AC-Laden (G) können während Zone 0 nicht starten.
    - **Deaktiviert:** Klassische Nulleinspeisung, kein aktives Einspeisen.

    </details>

    <details>
    <summary><b>⚡ AC Laden</b> 👈</summary>

    Laden der Batterie wenn eine externe Einspeisung ins Netz erkannt wird.
    Eintritt: `(Grid + Ausgangsleistung) < −Hysterese` — nach Abzug des Solakon-Beitrags liegt noch
    Überschuss an. Typischer Anwendungsfall: externe PV-Anlage speist Überschuss ins Netz.

    - **Blockiert durch:** Zone 0 (Überschuss), Tarif-Laden.
    - **Separate P/I-Faktoren:** P klein (~0.3–0.5) wegen langer Hardware-Flanke (~25 s).
    - **PI-Script:** `ac_charge_mode=true` → invertierte Fehlerberechnung: `target_offset − grid`.
    - **`at_max/at_min`-Guards** entfallen im AC-Lade-Modus (Richtung invertiert).

    </details>

    <details>
    <summary><b>🌙 Nachtabschaltung</b> 👈</summary>

    Betrifft ausschließlich Zone 2 (Fall F): Modus → Disabled, Output 0 W, Integral-Reset.
    Zone 1 und AC Laden laufen auch nachts weiter.

    - **Schwelle:** PV-Ladereserve aus den Zone-2-Parametern — kein separater Parameter.
    - **Zone 2 Reaktivierung:** Sobald PV wieder über die PV-Ladereserve steigt, greift Fall E.

    </details>

  domain: automation
  source_url: https://github.com/D4nte85/Solakon-One-Nulleinspeisung-Blueprint-homeassistant/edit/experimental-AC-tarif/solakon_one_nulleinspeisung.yaml
  input:

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔌 NETZ-SENSOR (Extern - z.B. Shelly 3EM)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      netz_entitäten:
        name: "🔌 NETZ-SENSOR (Extern - z.B. Shelly 3EM):"
        collapsed: true
        input:
          grid_power_sensor:
            name: 🔌 Shelly/Netz-Leistungssensor (ERFORDERLICH)
            description: |
              Sensor für die aktuelle Netzleistung (z.B. Shelly 3EM).
              ⚠️ WICHTIG: Positive Werte = Bezug, NEGATIVE WERTE = Einspeisung.
            selector:
              entity:
                domain: sensor
                device_class: power

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚡ SOLAKON ONE - ENTITÄTEN
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      solakon_entitäten:
        name: "⚡ SOLAKON ONE - ENTITÄTEN:"
        collapsed: true
        input:
          actual_power_sensor:
            name: ⚡ Solakon ONE - Tatsächliche Ausgangsleistung
            description: Die tatsächliche AC-Ausgangsleistung des Wechselrichters.
            default: sensor.solakon_one_leistung
            selector:
              entity:
                domain: sensor
                device_class: power

          solar_power_sensor:
            name: ☀️ Solakon ONE - Solarleistung (PV-Erzeugung)
            description: Die aktuelle PV-Gesamterzeugung in Watt.
            default: sensor.solakon_one_pv_leistung
            selector:
              entity:
                domain: sensor
                device_class: power

          soc_sensor:
            name: 🔋 Solakon ONE - Batterieladestand (SOC)
            description: Der aktuelle Batterieladestand in %.
            default: sensor.solakon_one_batterie_ladestand
            selector:
              entity:
                domain: sensor
                device_class: battery

          remote_timeout_countdown_sensor:
            name: ⏱️ Solakon ONE - Remote Timeout Countdown
            description: Sensor, der den verbleibenden Timeout-Countdown anzeigt.
            default: sensor.solakon_one_fernsteuerung_zeituberschreitung
            selector:
              entity:
                domain: sensor

          active_power_number:
            name: ⚙️ Solakon ONE - Ausgangsleistungsregler
            description: Die Entität zum Setzen des Leistungs-Sollwerts (Remote Active Power).
            default: number.solakon_one_fernsteuerung_leistung
            selector:
              entity:
                domain: number

          max_discharge_current_number:
            name: 🔋 Solakon ONE - Max. Entladestrom
            description: Die Entität zur Steuerung des maximalen Entladestroms (A).
            default: number.solakon_one_maximaler_entladestrom
            selector:
              entity:
                domain: number

          remote_timeout_set_number:
            name: ⏲️ Solakon ONE - Modus-Reset-Timer
            description: Dient zum Setzen/Zurücksetzen des Remote-Timeouts (max. 3599 s).
            default: number.solakon_one_fernsteuerung_zeituberschreitung
            selector:
              entity:
                domain: number

          mode_select:
            name: 🔄 Solakon ONE - Betriebsmodus-Auswahl
            description: Die Entität zum Umschalten des Betriebsmodus (Remote Control Mode).
            default: select.solakon_one_modus_fernsteuern
            selector:
              entity:
                domain: select

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🛠️ HOME ASSISTANT HELPER (ERFORDERLICH!)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      homeassistant_helper:
        name: "🛠️ HOME ASSISTANT HELPER (ERFORDERLICH!):"
        collapsed: true
        input:
          cycle_active_boolean_helper:
            name: 🛠️ Entladezyklus-Zustandsspeicher (input_boolean - ERFORDERLICH!)
            description: |
              ⚠️ WICHTIG: Erstellen Sie einen Schalter Helfer (Input Boolean).
              Einstellungen → Geräte & Dienste → Helfer → Helfer erstellen → Schalter
              - Name: z.B. 'SOC Entladezyklus Status'
              Dieser speichert, ob der Entladezyklus aktiv ist (Zone 1).
            default: input_boolean.soc_entladezyklus_status
            selector:
              entity:
                domain: input_boolean

          integral_helper:
            name: 🛠️ Integral-Speicher (input_number - ERFORDERLICH!)
            description: |
              ⚠️ WICHTIG: Erstellen Sie einen input_number Helper für den PI-Regler:
              Einstellungen → Geräte & Dienste → Helfer → Helfer erstellen → Number
              - Name: z.B. 'Solakon Integral'
              - Min: -1000  Max: 1000  Step: 1  Initial: 0
              Dieser speichert den I-Anteil des PI-Reglers.
            default: input_number.solakon_integral
            selector:
              entity:
                domain: input_number

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🎚️ REGELUNGS-PARAMETER (PI)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      PI_parameter:
        name: "🎚️ REGELUNGS-PARAMETER (PI):"
        collapsed: true
        input:
          PI_regler_script:
            name: 📜 PI-Regler Script
            description: Das aus dem "PI-Regler" Blueprint erstellte Script.
            default: script.pi_regler
            selector:
              entity:
                domain: script

          regulator_factor:
            name: 🎛️ P-Faktor (Proportional-Verstärkung)
            description: |
              P-Anteil des PI-Reglers: Reagiert auf aktuelle Abweichung (z.B. 1.3).
              Höher = schnellere, aggressivere Reaktion | Niedriger = sanftere Reaktion
            default: 1.3
            selector:
              number:
                min: 0.1
                max: 5
                step: 0.1

          ki_factor:
            name: 🎛️ I-Faktor (Integral-Verstärkung)
            description: |
              I-Anteil des PI-Reglers: Eliminiert bleibende Abweichungen (z.B. 0.05).
              Höher = schnellere Korrektur, aber instabiler | Niedriger = langsamer, stabiler
            default: 0.05
            selector:
              number:
                min: 0.01
                max: 0.2
                step: 0.01

          tolerance:
            name: 📏 Toleranzbereich (Totband)
            description: |
              Bereich in Watt um den Nullpunkt, in dem KEINE Korrektur stattfindet (z.B. ±25 W).
              Verhindert permanente Mini-Korrekturen bei stabiler Regelung.
            default: 25
            selector:
              number:
                min: 0
                max: 200
                unit_of_measurement: W

          wait_time:
            name: ⏱️ Wartezeit nach setzen des Ausgangs
            description: |
              Verzögerung (in Sekunden) nach dem Setzen der Ausgangsleistung.
              Gibt dem Wechselrichter sowie den Sensoren Zeit, neue Werte zu verarbeiten.
              ⚠️ WICHTIG: Modbus-Update-Einstellungen beachten!
            default: 3
            selector:
              number:
                min: 0
                max: 30
                step: 1
                unit_of_measurement: s

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔋 SOC-ZONEN-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      soc_parameter:
        name: "🔋 SOC-ZONEN-PARAMETER:"
        collapsed: true
        input:
          soc_fast_limit:
            name: 🔋 SOC-Schwelle "Zone 1 Start" (Aggressive Entladung)
            description: |
              Obere Schwelle (z.B. 50 %).
              Überschreiten aktiviert Zone 1 (aggressive Entladung).
              Zone 1 läuft dann bis SOC < Zone-3-Schwelle fällt (kein Yo-Yo-Effekt).
            default: 50
            selector:
              number:
                min: 1
                max: 99
                unit_of_measurement: "%"

          soc_conservation_limit:
            name: 🔋 SOC-Schwelle "Zone 3 Stopp" (Sicherheits-Grenze)
            description: |
              Untere Schwelle (z.B. 20 %).
              Unterschreiten stoppt die Entladung komplett (Zone 3 = Disabled).
              ⚠️ MUSS kleiner sein als Zone-1-Schwelle!
            default: 20
            selector:
              number:
                min: 1
                max: 49
                unit_of_measurement: "%"

          default_discharge_current:
            name: 🔋 Max. Entladestrom Zone 1 (A)
            description: |
              Maximaler Entladestrom in Zone 1 (z.B. 40 A).
              Zone 2 und AC/Tarif-Laden setzen automatisch 0 A.
            default: 40
            selector:
              number:
                min: 0
                max: 40
                step: 1
                unit_of_measurement: A

          nullpunkt_offset_1:
            name: 📊 Nullpunkt-Offset Zone 1 (Statisch)
            description: |
              Statischer Offset für Zone 1 (z.B. 30 W = leichter Netzbezug angestrebt).
              Wird durch den dynamischen Offset überschrieben wenn eine Entität gewählt ist.
            default: 30
            selector:
              number:
                min: -100
                max: 100
                unit_of_measurement: W

          nullpunkt_offset_entity_1:
            name: 📊 Nullpunkt-Offset Zone 1 (Dynamisch)
            description: |
              Optionale input_number Entität für dynamischen Offset Zone 1.
              Überschreibt den statischen Wert wenn gültig. Empfohlen: Solakon Dynamic Offset Blueprint.
            default: {}
            selector:
              entity:
                domain: input_number

          nullpunkt_offset_2:
            name: 📊 Nullpunkt-Offset Zone 2 (Statisch)
            description: |
              Statischer Offset für Zone 2 (z.B. 30 W = leichter Netzbezug angestrebt).
              Wird durch den dynamischen Offset überschrieben wenn eine Entität gewählt ist.
            default: 30
            selector:
              number:
                min: -100
                max: 100
                unit_of_measurement: W

          nullpunkt_offset_entity_2:
            name: 📊 Nullpunkt-Offset Zone 2 (Dynamisch)
            description: |
              Optionale input_number Entität für dynamischen Offset Zone 2.
              Überschreibt den statischen Wert wenn gültig.
            default: {}
            selector:
              entity:
                domain: input_number

          pv_charge_reserve:
            name: ☀️ PV-Ladereserve (Zone 2 Limit)
            description: |
              Dynamisches Output-Limit in Zone 2: Max(0, PV − Reserve).
              Stellt sicher, dass in Zone 2 immer PV-Leistung für die Batterie reserviert bleibt.
              Dient auch als PV-Schwelle für die Nachtabschaltung.
            default: 50
            selector:
              number:
                min: 0
                max: 1000
                unit_of_measurement: W

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔒 SICHERHEITS-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      sicherheits_parameter:
        name: "🔒 SICHERHEITS-PARAMETER:"
        collapsed: true
        input:
          max_active_power_limit:
            name: 🔒 Maximale Ausgangsleistung (Hard Limit)
            description: |
              Absolute Obergrenze der AC-Ausgangsleistung (z.B. 800 W).
              Gilt für Zone 0 und Zone 1. Z.B. Geräte-Maximum 1200 W.
            default: 800
            selector:
              number:
                min: 0
                max: 1200
                unit_of_measurement: W

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ☀️ ÜBERSCHUSS-EINSPEISUNG (Optional - Zone 0)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      surplus_parameter:
        name: "☀️ ÜBERSCHUSS-EINSPEISUNG (Optional - Zone 0):"
        collapsed: true
        input:
          surplus_export_enabled:
            name: ☀️ Überschuss-Einspeisung aktivieren
            description: |
              ✅ EIN: SOC ≥ Schwelle UND (PV > Verbrauch + PV-Hysterese ODER PV = 0) → Output auf Maximum.
              ❌ AUS: Klassische Nulleinspeisung.
              ⚠️ Zone 0 blockiert den Eintritt in Tarif-Laden und AC-Laden.
            default: false
            selector:
              boolean:

          soc_export_limit:
            name: 🔋 SOC-Schwelle für Überschuss-Einspeisung
            description: |
              Ab diesem SOC (z.B. 90 %) wird bei PV-Überschuss ins Netz eingespeist.
            default: 90
            selector:
              number:
                min: 50
                max: 99
                unit_of_measurement: "%"

          surplus_exit_hysteresis:
            name: 🔋 Überschuss-Einspeisung Hysterese (SOC)
            description: |
              SOC muss um diesen Wert unter die Schwelle fallen bevor Zone 0 verlassen wird
              (z.B. 5 % → Austritt bei SOC < 85 % wenn Schwelle = 90 %).
            default: 5
            selector:
              number:
                min: 1
                max: 20
                unit_of_measurement: "%"

          surplus_pv_hysteresis:
            name: ☀️ PV-Überschuss Hysterese
            description: |
              Totband um den Hausverbrauch.
              Eintritt: PV > Verbrauch + Hysterese; Austritt: PV ≤ Verbrauch − Hysterese.
            default: 50
            selector:
              number:
                min: 10
                max: 200
                unit_of_measurement: W

          surplus_state_helper:
            name: ☀️ Surplus-Zustand Speicher (input_boolean - nur für Zone 0)
            description: |
              input_boolean Helper zum persistenten Tracken des Surplus-Zustands.
              ⚠️ Nur erforderlich wenn Überschuss-Einspeisung aktiviert ist.
            default: {}
            selector:
              entity:
                domain: input_boolean

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚡ AC LADEN (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      ac_parameter:
        name: "⚡ AC LADEN (Optional):"
        description: |
          Lädt die Batterie wenn externe Einspeisung ins Netz erkannt wird.
          Blockiert durch: Zone 0 (Überschuss) und Tarif-Laden.
          AC Laden und Tarif-Laden sind voneinander unabhängig konfigurierbar.
        collapsed: true
        input:
          ac_charge_enabled:
            name: ⚡ AC Laden aktivieren
            description: |
              ✅ EIN: Lädt wenn (Grid + Output) < −Hysterese.
              ❌ AUS: Funktion deaktiviert.
              ⚠️ Startet nicht während Zone 0 (Überschuss) oder Tarif-Laden aktiv ist.
            default: false
            selector:
              boolean:

          soc_ac_charge_limit:
            name: 🔋 SOC-Ladeziel AC Laden
            description: AC Laden stoppt wenn SOC diesen Wert erreicht.
            default: 90
            selector:
              number:
                min: 10
                max: 99
                unit_of_measurement: "%"

          ac_charge_power_limit:
            name: ⚡ Max. Ladeleistung AC Laden
            description: Obergrenze der AC-Ladeleistung (`max_power` ans PI-Script).
            default: 800
            selector:
              number:
                min: 50
                max: 1200
                unit_of_measurement: W

          ac_charge_hysteresis:
            name: 📏 Hysterese Ladeabbruch
            description: |
              Totband für Ein- und Austritt.
              Eintritt: (Grid + Output) < −Hysterese.
              Austritt: Grid ≥ (Offset + Hysterese) UND Output = 0 W.
            default: 50
            selector:
              number:
                min: 0
                max: 300
                unit_of_measurement: W

          ac_charge_offset:
            name: 📊 AC Laden Offset (Statisch)
            description: |
              Regelziel im AC-Lade-Modus. Negativ = Einspeisung angestrebt → höhere Ladeleistung.
            default: -50
            selector:
              number:
                min: -100
                max: 100
                unit_of_measurement: W

          ac_charge_offset_entity:
            name: 📊 AC Laden Offset (Dynamisch)
            description: |
              Optionale input_number Entität für dynamischen AC-Lade-Offset.
              Überschreibt den statischen Wert wenn gültig.
            default: {}
            selector:
              entity:
                domain: input_number

          ac_charge_p_factor:
            name: 🎛️ P-Faktor AC Laden
            description: |
              Bei langer Hardware-Flanke (~25 s) klein halten → wenig Überschwingen.
              Empfehlung: 0.3–0.5.
            default: 0.5
            selector:
              number:
                min: 0.1
                max: 5
                step: 0.1

          ac_charge_i_factor:
            name: 🎛️ I-Faktor AC Laden
            description: |
              Integral-Verstärkung für den AC-Lade-Modus.
              Macht bei langer Hardware-Flanke (~25 s) die eigentliche Regelarbeit.
              Empfehlung: 0.05–0.1.
            default: 0.07
            selector:
              number:
                min: 0
                max: 0.2
                step: 0.01

          ac_charge_state_helper:
            name: ⚡ AC-Lade-Zustand Speicher (input_boolean - nur für AC Laden)
            description: |
              input_boolean Helper zum persistenten Tracken des AC-Lade-Zustands.
              ⚠️ Nur erforderlich wenn AC Laden aktiviert ist.
            default: {}
            selector:
              entity:
                domain: input_boolean

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 💹 TARIF-ARBITRAGE (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      tariff_parameter:
        name: "💹 TARIF-ARBITRAGE (Optional):"
        description: |
          Laden bei günstigem Tarif, Entladesperre bei günstigem/neutralem Tarif.
          Preis < günstig: Tarif-Laden + Entladesperre (Zone 1 UND Zone 2 werden gestoppt).
          günstig ≤ Preis < teuer: nur Entladesperre (Zone 1 UND Zone 2 werden gestoppt, Akku passiv).
          Preis ≥ teuer: normale SOC-Zonen-Logik.
          ⚠️ Tarif-Laden startet nicht während Zone 0 (Überschuss) aktiv ist.
        collapsed: true
        input:
          tariff_arbitrage_enabled:
            name: 💹 Tarif-Arbitrage aktivieren
            description: |
              ✅ EIN: Tarif-gesteuertes Laden und Entladesperre aktiv.
              ❌ AUS: Funktion deaktiviert.
            default: false
            selector:
              boolean:

          price_sensor:
            name: 📈 Strompreis-Sensor
            description: |
              Sensor für den aktuellen Strompreis (z.B. Tibber, Awattar, eigene input_number).
              ⚠️ Einheit ist egal — Sensor-Wert und Schwellwerte müssen dieselbe Einheit verwenden.
            default: {}
            selector:
              entity:
                domain: sensor

          cheap_threshold:
            name: 💚 Günstig-Schwelle (Laden + Entladesperre)
            description: |
              Unter diesem Wert: Batterie laden (Tarif-Laden) UND Entladesperre aktiv.
              Einheit muss zum Preissensor passen (z.B. 10 für 10 ct/kWh).
            default: 10
            selector:
              number:
                min: -100
                max: 100
                step: 0.1

          expensive_threshold:
            name: 🔴 Teuer-Schwelle (Entladesperre aufheben)
            description: |
              Ab diesem Wert: Entladesperre aufgehoben, normale SOC-Zonen-Logik greift.
              Zwischen günstig und teuer: nur Entladesperre — Zone 1 und Zone 2 werden gestoppt.
            default: 25
            selector:
              number:
                min: -100
                max: 100
                step: 0.1

          tariff_soc_charge_target:
            name: 🔋 SOC-Ladeziel Tarif-Laden
            description: Tarif-Laden stoppt bei diesem SOC. Unabhängig vom AC-Laden-Ladeziel.
            default: 90
            selector:
              number:
                min: 10
                max: 99
                unit_of_measurement: "%"

          tariff_charge_power:
            name: ⚡ Ladeleistung Tarif-Laden
            description: |
              Direkt gesetzter Wert — kein PI-Regler. Z.B. Geräte-Maximum 1200 W.
            default: 800
            selector:
              number:
                min: 50
                max: 1200
                unit_of_measurement: W

          tariff_charge_state_helper:
            name: 💹 Tarif-Lade-Zustand Speicher (input_boolean - nur für Tarif-Arbitrage)
            description: |
              input_boolean Helper zum persistenten Tracken des Tarif-Lade-Zustands.
              ⚠️ Nur erforderlich wenn Tarif-Arbitrage aktiviert ist.
            default: {}
            selector:
              entity:
                domain: input_boolean

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🌙 NACHTABSCHALTUNG (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      night_parameter:
        name: "🌙 NACHTABSCHALTUNG (Optional):"
        collapsed: true
        input:
          night_shutdown_enabled:
            name: 🌙 Nachtabschaltung aktivieren
            description: |
              Deaktiviert Zone 2 nachts automatisch (bei PV < PV-Ladereserve).
              ⚠️ Zone 1 und AC Laden laufen auch nachts weiter!
            default: false
            selector:
              boolean:


mode: single
max_exceeded: silent

variables:
  # Grid / Solar / Actual Power
  grid_power: !input grid_power_sensor
  grid_power_float: "{{ states(grid_power) | float(0) }}"
  solar_power: !input solar_power_sensor
  solar_power_float: "{{ states(solar_power) | float(0) }}"
  actual_power_sensor: !input actual_power_sensor
  actual_power_float: "{{ states(actual_power_sensor) | float(0) }}"

  # Zonen-Schwellwerte
  soc_fast_limit_int: !input soc_fast_limit
  soc_conservation_limit_int: !input soc_conservation_limit

  # Aktuelle Sensorwerte für Conditions
  soc: !input soc_sensor
  timeout_countdown: !input remote_timeout_countdown_sensor
  solakon_mode: !input mode_select
  cycle_active: !input cycle_active_boolean_helper

  # Nachtabschaltung
  night_shutdown_enabled_bool: !input night_shutdown_enabled
  pv_charge_reserve_int: !input pv_charge_reserve

  # Toleranz
  tolerance_int: !input tolerance

  # Helper-Entitäten
  integral_entity: !input integral_helper
  active_power_entity: !input active_power_number
  discharge_current_entity: !input max_discharge_current_number
  remote_timeout_set_number: !input remote_timeout_set_number

  # Parameter
  discharge_current_max: !input default_discharge_current
  max_active_power_limit_int: !input max_active_power_limit
  wait_time_int: !input wait_time

  # PI
  pi_script: !input PI_regler_script
  regulator_factor_float: !input regulator_factor
  ki_factor_float: !input ki_factor

  # Offsets Zone 1/2
  offset_1_static: !input nullpunkt_offset_1
  offset_1_entity_id: !input nullpunkt_offset_entity_1
  offset_1_int: >
    {% if offset_1_entity_id is string and offset_1_entity_id | length > 0 and states(offset_1_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
      {{ states(offset_1_entity_id) | float(offset_1_static) }}
    {% else %}
      {{ offset_1_static }}
    {% endif %}

  offset_2_static: !input nullpunkt_offset_2
  offset_2_entity_id: !input nullpunkt_offset_entity_2
  offset_2_int: >
    {% if offset_2_entity_id is string and offset_2_entity_id | length > 0 and states(offset_2_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
      {{ states(offset_2_entity_id) | float(offset_2_static) }}
    {% else %}
      {{ offset_2_static }}
    {% endif %}

  # Surplus
  soc_export_limit_int: !input soc_export_limit
  surplus_exit_hysteresis_int: !input surplus_exit_hysteresis
  surplus_pv_hysteresis_int: !input surplus_pv_hysteresis
  surplus_export_enabled_bool: !input surplus_export_enabled
  surplus_state_entity: !input surplus_state_helper
  surplus_entity_valid: >
    {{ surplus_export_enabled_bool and
       surplus_state_entity is string and
       surplus_state_entity | length > 0 and
       states(surplus_state_entity) not in ['unknown', 'unavailable'] }}

  # AC Laden
  ac_charge_enabled_bool: !input ac_charge_enabled
  soc_ac_charge_limit_int: !input soc_ac_charge_limit
  ac_charge_power_limit_int: !input ac_charge_power_limit
  ac_charge_hysteresis_int: !input ac_charge_hysteresis
  ac_charge_state_entity: !input ac_charge_state_helper
  ac_charge_entity_valid: >
    {{ ac_charge_enabled_bool and
       ac_charge_state_entity is string and
       ac_charge_state_entity | length > 0 and
       states(ac_charge_state_entity) not in ['unknown', 'unavailable'] }}
  ac_charge_mode_active: "{{ ac_charge_entity_valid | bool(false) and is_state(ac_charge_state_entity, 'on') }}"
  ac_charge_offset_static: !input ac_charge_offset
  ac_charge_offset_entity_id: !input ac_charge_offset_entity
  ac_charge_offset_int: >
    {% if ac_charge_offset_entity_id is string and ac_charge_offset_entity_id | length > 0 and states(ac_charge_offset_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
      {{ states(ac_charge_offset_entity_id) | float(ac_charge_offset_static) }}
    {% else %}
      {{ ac_charge_offset_static }}
    {% endif %}
  ac_charge_p_factor_float: !input ac_charge_p_factor
  ac_charge_i_factor_float: !input ac_charge_i_factor

  # Tarif-Arbitrage
  tariff_arbitrage_enabled_bool: !input tariff_arbitrage_enabled
  tariff_cheap_threshold_float: !input cheap_threshold
  tariff_expensive_threshold_float: !input expensive_threshold
  tariff_soc_charge_target_int: !input tariff_soc_charge_target
  tariff_charge_power_int: !input tariff_charge_power
  tariff_charge_state_entity: !input tariff_charge_state_helper
  tariff_charge_entity_valid: >
    {{ tariff_arbitrage_enabled_bool and
       tariff_charge_state_entity is string and
       tariff_charge_state_entity | length > 0 and
       states(tariff_charge_state_entity) not in ['unknown', 'unavailable'] }}
  tariff_charge_mode_active: "{{ tariff_charge_entity_valid | bool(false) and is_state(tariff_charge_state_entity, 'on') }}"
  price_sensor_entity: !input price_sensor
  price_sensor_valid: >
    {{ tariff_arbitrage_enabled_bool and
       price_sensor_entity is string and
       price_sensor_entity | length > 0 and
       states(price_sensor_entity) not in ['unknown', 'unavailable'] }}
  # Fallback: teuer+1 wenn Sensor nicht verfügbar → weder laden noch sperren
  current_price_float: >
    {% if price_sensor_valid | bool(false) %}
      {{ states(price_sensor_entity) | float(tariff_expensive_threshold_float + 1) }}
    {% else %}
      {{ tariff_expensive_threshold_float + 1 }}
    {% endif %}
  price_is_cheap: "{{ price_sensor_valid | bool(false) and current_price_float < tariff_cheap_threshold_float }}"
  # Entladesperre gilt für günstig UND neutral (alles unter teuer-Schwelle)
  price_discharge_locked: "{{ tariff_arbitrage_enabled_bool and price_sensor_valid | bool(false) and current_price_float < tariff_expensive_threshold_float }}"

  # PI-Regler Variablen
  current_active_power: "{{ states(active_power_entity) | float(0) }}"
  integral_old: "{{ states(integral_entity) | float(0) }}"

  # Ziel-Offset (modusabhängig)
  target_offset: >
    {% if ac_charge_mode_active | bool(false) %}
      {{ ac_charge_offset_int }}
    {% elif is_state(cycle_active, 'on') %}
      {{ offset_1_int }}
    {% else %}
      {{ offset_2_int }}
    {% endif %}

  # Dynamisches Power-Limit
  dynamic_max_power: >
    {% if states(solakon_mode) == '3' %}
      {% if tariff_charge_mode_active | bool(false) %}
        {{ tariff_charge_power_int }}
      {% else %}
        {{ ac_charge_power_limit_int }}
      {% endif %}
    {% elif is_state(cycle_active, 'on') %}
      {{ max_active_power_limit_int }}
    {% else %}
      {{ [0, solar_power_float - (pv_charge_reserve_int | float(0))] | max }}
    {% endif %}

  # Fehler für Guards
  raw_error: "{{ grid_power_float - (target_offset | float(0)) }}"
  grid_error_abs: "{{ (grid_power_float - (target_offset | float(0))) | abs }}"

  # At-Limit Guards
  at_max_limit: "{{ raw_error > 0 and current_active_power >= max_active_power_limit_int | float(0) }}"
  at_min_limit: "{{ raw_error < 0 and current_active_power <= 0 }}"


triggers:
  - trigger: state
    entity_id: !input grid_power_sensor
    id: grid_power_change

  - trigger: state
    entity_id: !input solar_power_sensor
    id: solar_power_change

  - trigger: numeric_state
    entity_id: !input soc_sensor
    above: !input soc_fast_limit
    id: soc_high

  - trigger: numeric_state
    entity_id: !input soc_sensor
    below: !input soc_conservation_limit
    id: soc_low

  - trigger: state
    entity_id: !input mode_select
    id: mode_change


actions:
  # -------------------------------------------------------------------------------------------------
  # PRÜFUNG: Check auf kritische Fehler
  # -------------------------------------------------------------------------------------------------
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ soc_fast_limit_int | float(0) <= soc_conservation_limit_int | float(0) }}"
              - condition: template
                value_template: >
                  {{ is_state(soc, 'unknown') or is_state(soc, 'unavailable') or
                     is_state(timeout_countdown, 'unknown') or is_state(timeout_countdown, 'unavailable') }}
        sequence:
          - action: system_log.write
            data:
              level: error
              message: "Solakon Fehler: SOC-Limits ungültig oder Entitäten offline. Abbruch."
          - stop: "Kritischer Fehler oder ungültige Konfiguration."

  # -------------------------------------------------------------------------------------------------
  # 0. ÜBERSCHUSS-LOGIK (ZONE 0) STATUS-UPDATE
  # -------------------------------------------------------------------------------------------------
  - choose:
      # FALL 0A: ÜBERSCHUSS STARTEN
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) }}"
          - condition: state
            entity_id: !input surplus_state_helper
            state: 'off'
          - condition: template
            value_template: >
              {{ (states(soc) | float(0) >= soc_export_limit_int) and
                 (solar_power_float > (actual_power_float + grid_power_float + surplus_pv_hysteresis_int) or solar_power_float == 0) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "☀️ Zone 0 aktiviert (Überschuss-Einspeisung startet)"
              entity_id: !input solar_power_sensor
          - action: input_boolean.turn_on
            target:
              entity_id: !input surplus_state_helper

      # FALL 0B: ÜBERSCHUSS BEENDEN
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) }}"
          - condition: state
            entity_id: !input surplus_state_helper
            state: 'on'
          - condition: template
            value_template: >
              {{ (states(soc) | float(0) < (soc_export_limit_int - surplus_exit_hysteresis_int)) or
                 (solar_power_float <= (actual_power_float + grid_power_float - surplus_pv_hysteresis_int)) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "☁️ Zone 0 deaktiviert (Überschuss-Einspeisung beendet)"
              entity_id: !input solar_power_sensor
          - action: input_boolean.turn_off
            target:
              entity_id: !input surplus_state_helper
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0

  # -------------------------------------------------------------------------------------------------
  # HAUPT-LOGIK: Modus- und Zyklus-Steuerung
  # Reihenfolge: A, B, C, D (vor GT/G!), GT, HT, TM, G, H, I, E, F
  # -------------------------------------------------------------------------------------------------
  - choose:
      # FALL A: ZONE 1 - Aggressive Entladung START
      # Guard: kein AC-Laden aktiv, keine Entladesperre (Preis < teuer)
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (price_discharge_locked | bool(false)) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_fast_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🔋 Zone 1 aktiviert (Aggressive Entladung) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - action: input_boolean.turn_on
            target:
              entity_id: !input cycle_active_boolean_helper
          # Surplus-Zustand zurücksetzen (nur wenn aktiv)
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          # AC-Lade-Zustand zurücksetzen (nur wenn aktiv)
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          # Timer-Toggle (3598↔3599)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '1'

      # FALL B: ZONE 3 - Sicherheits-STOPP (SOC < Zone-3-Schwelle UND Zyklus ON)
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_conservation_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🛑 Zone 3 aktiviert (Sicherheits-Stopp) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - action: input_boolean.turn_off
            target:
              entity_id: !input cycle_active_boolean_helper
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'

      # FALL C: ZONE 3 - Absicherung (Zyklus OFF, Modus noch aktiv)
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_conservation_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) != '0' }}"
        sequence:
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'

      # FALL D: Recovery - Modus fiel ab, Zyklus noch aktiv
      # VOR Fall GT/G! Schließt Modus '3' aus (AC/Tarif-Laden laufen ungestört weiter).
      - conditions:
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
          - condition: template
            value_template: "{{ states(solakon_mode) not in ['1', '3'] }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_conservation_limit_int }}"
        sequence:
          - action: logbook.log
            data:
              name: Solakon Recovery
              message: "🔄 Recovery — Modus-Reaktivierung. SOC: {{ states(soc) }}%, Modus war: {{ states(solakon_mode) }}"
              entity_id: !input mode_select
          # Timer-Toggle (3598↔3599)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          # Modus wiederherstellen: '3' wenn AC Laden oder Tarif-Laden aktiv, sonst '1'
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ (ac_charge_entity_valid | bool(false) and
                          is_state(ac_charge_state_entity, 'on')) or
                         (tariff_charge_entity_valid | bool(false) and
                          is_state(tariff_charge_state_entity, 'on')) }}
                sequence:
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '3'
            default:
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '1'

      # FALL GT: TARIF-LADEN — Eintritt
      # Guard: Modus ≠ '3' — verhindert Re-Eintritt wenn Tarif-Laden bereits aktiv
      # Guard: NICHT Überschuss-Bool = on — Zone 0 hat Vorrang
      - conditions:
          - condition: template
            value_template: "{{ tariff_arbitrage_enabled_bool }}"
          - condition: template
            value_template: "{{ tariff_charge_entity_valid | bool(false) }}"
          - condition: template
            value_template: "{{ price_is_cheap | bool(false) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < tariff_soc_charge_target_int }}"
          - condition: template
            value_template: "{{ states(solakon_mode) != '3' }}"
          - condition: template
            value_template: "{{ not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) }}"
        sequence:
          - action: logbook.log
            data:
              name: Solakon Tarif-Arbitrage
              message: >
                💹 Tarif-Laden aktiviert
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Preis: {{ states(price_sensor_entity) }}, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          - action: input_boolean.turn_on
            target:
              entity_id: !input tariff_charge_state_helper
          # Timer-Toggle (3598↔3599)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          # Output → Ladeleistung (direkt, kein PI)
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: "{{ tariff_charge_power_int }}"
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '3'
          - stop: ""

      # FALL HT: TARIF-LADEN BEENDEN
      - conditions:
          - condition: template
            value_template: >
              {{ tariff_arbitrage_enabled_bool and
                 states(solakon_mode) == '3' and
                 (tariff_charge_mode_active | bool(false)) }}
          - condition: template
            value_template: >
              {{ states(soc) | float(0) >= tariff_soc_charge_target_int or
                 not (price_is_cheap | bool(false)) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon Tarif-Arbitrage
              message: >
                💹 Tarif-Laden beendet
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Preis: {{ states(price_sensor_entity) }}, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - action: input_boolean.turn_off
            target:
              entity_id: !input tariff_charge_state_helper
          # Zone 1 → Modus '1' (Timer-Toggle) | Zone 2 → Disabled + 0 W
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input active_power_number
                    data:
                      value: 0
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'
                  - stop: ""
            default:
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: 0
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '0'

      # FALL TM: TARIF DISCHARGE-LOCK — Mittlere Preiszone (günstig ≤ Preis < teuer)
      # Stoppt laufende Entladung (Zone 1 UND Zone 2) wenn Preis zwischen günstig und teuer liegt.
      # Guard: kein AC/Tarif-Laden aktiv, Modus = '1' (Entladung läuft)
      - conditions:
          - condition: template
            value_template: "{{ tariff_arbitrage_enabled_bool }}"
          - condition: template
            value_template: "{{ price_sensor_valid | bool(false) }}"
          - condition: template
            value_template: >
              {{ current_price_float >= tariff_cheap_threshold_float and
                 current_price_float < tariff_expensive_threshold_float }}
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ states(solakon_mode) == '1' }}"
        sequence:
          - action: logbook.log
            data:
              name: Solakon Tarif-Arbitrage
              message: >
                🔒 Discharge-Lock: Preis {{ states(price_sensor_entity) }} im mittleren Bereich.
                Zone {{ '1' if is_state(cycle_active, 'on') else '2' }} deaktiviert.
              entity_id: !input soc_sensor
          # Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # Zone 1: Zyklus und Hilfsstatus zurücksetzen
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  # Zyklus deaktivieren
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input cycle_active_boolean_helper
                  # Surplus-Zustand zurücksetzen (nur wenn aktiv)
                  - choose:
                      - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                        sequence:
                          - action: input_boolean.turn_off
                            target:
                              entity_id: !input surplus_state_helper
          # Output → 0 W
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          # Modus → '0' (Disabled)
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'

      # FALL G: AC LADEN — Eintritt
      # Guard: Modus ≠ '3' — verhindert Re-Eintritt wenn AC Laden bereits aktiv
      # Guard: NICHT Tarif-Lade-Bool = on — Tarif-Laden hat Vorrang
      # Guard: NICHT Überschuss-Bool = on — Zone 0 hat Vorrang
      - conditions:
          - condition: template
            value_template: "{{ ac_charge_enabled_bool }}"
          - condition: template
            value_template: "{{ ac_charge_entity_valid | bool(false) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_ac_charge_limit_int }}"
          - condition: template
            value_template: "{{ states(solakon_mode) != '3' }}"
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) }}"
          - condition: template
            value_template: "{{ (grid_power_float + actual_power_float) < (-1 * (ac_charge_hysteresis_int | float(0))) }}"
        sequence:
          - action: logbook.log
            data:
              name: Solakon AC Laden
              message: >
                ⚡ AC Laden aktiviert
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Grid: {{ grid_power_float }}W, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          - action: input_boolean.turn_on
            target:
              entity_id: !input ac_charge_state_helper
          # Timer-Toggle (3598↔3599)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          # Output → 0 W (PI startet sauber)
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '3'
          - stop: ""

      # FALL H: AC LADEN BEENDEN
      # Guard: actual_power == 0 verhindert Fehlauslösung während PI noch regelt
      - conditions:
          - condition: template
            value_template: "{{ states(solakon_mode) == '3' }}"
          - condition: template
            value_template: "{{ ac_charge_mode_active | bool(false) }}"
          - condition: template
            value_template: >
              {{ states(soc) | float(0) >= soc_ac_charge_limit_int or
                 (grid_power_float >= (ac_charge_offset_int + ac_charge_hysteresis_int | float(0)) and
                  actual_power_float == 0) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon AC Laden
              message: >
                ⚡ AC Laden beendet
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - action: input_boolean.turn_off
            target:
              entity_id: !input ac_charge_state_helper
          # Zone 1 → Modus '1' (Timer-Toggle) | Zone 2 → Disabled + 0 W
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input active_power_number
                    data:
                      value: 0
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'
                  - stop: ""
            default:
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: 0
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '0'

      # FALL I: SAFETY — Modus '3' ohne aktive Lade-Session
      # Fängt externen Modus-'3'-Zustand ohne legitime Session ab
      - conditions:
          - condition: template
            value_template: "{{ states(solakon_mode) == '3' }}"
          - condition: template
            value_template: >
              {{ not (ac_charge_entity_valid | bool(false) and is_state(ac_charge_state_entity, 'on')) }}
          - condition: template
            value_template: >
              {{ not (tariff_charge_entity_valid | bool(false) and is_state(tariff_charge_state_entity, 'on')) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon Safety
              message: >
                ⚠️ Fall I — Modus '3' erkannt, keine aktive Lade-Session. Korrektur.
                Zone {{ '1' if is_state(cycle_active, 'on') else '2' }}
                — SOC: {{ states(soc) }}%
              entity_id: !input mode_select
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # Zone 1 → Modus '1' (Timer-Toggle) | Zone 2 → Disabled + 0 W
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input active_power_number
                    data:
                      value: 0
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'
                  - stop: ""
            default:
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: 0
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '0'

      # FALL E: ZONE 2 - Batterieschonend START
      # Guard: kein AC-Laden aktiv, keine Entladesperre (Preis < teuer), kein Nacht
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (price_discharge_locked | bool(false)) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_conservation_limit_int and states(soc) | float(0) <= soc_fast_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) == '0' }}"
          - condition: template
            value_template: >
              {{ not night_shutdown_enabled_bool or
                 (states(solar_power) | float(0)) >= pv_charge_reserve_int | float(0) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🔋 Zone 2 aktiviert (Batterieschonend) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # Timer-Toggle (3598↔3599)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '1'

      # FALL F: NACHTABSCHALTUNG — Zone 2 bei PV < Reserve deaktivieren
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ night_shutdown_enabled_bool }}"
          - condition: template
            value_template: "{{ (states(solar_power) | float(0)) < pv_charge_reserve_int | float(0) }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) != '0' }}"
        sequence:
          - action: logbook.log
            data:
              name: Solakon Nachtabschaltung
              message: "🌙 Nachtabschaltung — Zone 2 deaktiviert. PV: {{ states(solar_power) }}W"
              entity_id: !input solar_power_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'

  # -------------------------------------------------------------------------------------------------
  # PI-GATE: Entladestrom, Timeout-Reset, Output
  # Nur wenn Modus aktiv (1 oder 3)
  # -------------------------------------------------------------------------------------------------
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ states(solakon_mode) not in ['1', '3'] }}"
        sequence:
          - stop: ""

  # SCHRITT 1: Entladestrom setzen
  - choose:
      # SCHRITT 1a: Zone 1 — Max-Wert (nur wenn Surplus NICHT aktiv UND NICHT AC/Tarif-Laden)
      - conditions:
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
          - condition: template
            value_template: >
              {{ states(solakon_mode) != '3' and
                 not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != discharge_current_max | float(0) | round(2) }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: "{{ discharge_current_max }}"

      # SCHRITT 1b: Zone 0 (Surplus) — Stabilitätspuffer 2 A
      - conditions:
          - condition: template
            value_template: >
              {{ (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != 2 }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: 2

      # SCHRITT 1c: Zone 2 oder AC/Tarif-Laden — 0 A
      - conditions:
          - condition: template
            value_template: >
              {{ (is_state(cycle_active, 'off') or states(solakon_mode) == '3') and
                 not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != 0 }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: 0

  # SCHRITT 2: Timeout-Reset (Timer-Toggle 3598↔3599)
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ states(timeout_countdown) | int(9999) < 120 }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599

  # SCHRITT 3: Ausgangsleistung setzen + Integral verwalten
  - choose:
      # ZWEIG A: Zone 0 — Überschuss (Hard Limit + Integral einfrieren)
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on') }}"
        sequence:
          - parallel:
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: "{{ max_active_power_limit_int }}"
              - action: input_number.set_value
                target:
                  entity_id: !input integral_helper
                data:
                  value: "{{ integral_old }}"
          - delay:
              seconds: "{{ wait_time_int }}"

      # ZWEIG BT: Tarif-Laden — Direkt setzen (kein PI-Regler)
      - conditions:
          - condition: template
            value_template: "{{ tariff_charge_mode_active | bool(false) }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: "{{ tariff_charge_power_int }}"
          - delay:
              seconds: "{{ wait_time_int }}"

      # ZWEIG B: AC Laden — PI-Script mit ac_charge_mode=true (invertierte Fehlerberechnung)
      # at_max/at_min Guards entfallen: Fehlerrichtung ist im Script invertiert
      - conditions:
          - condition: template
            value_template: "{{ ac_charge_mode_active | bool(false) and grid_error_abs > tolerance_int }}"
        sequence:
          - action: "{{ pi_script }}"
            data:
              grid_power: !input grid_power_sensor
              current_power: "{{ current_active_power }}"
              target_offset: "{{ target_offset }}"
              max_power: "{{ dynamic_max_power }}"
              tolerance: "{{ tolerance_int }}"
              p_factor: "{{ ac_charge_p_factor_float }}"
              i_factor: "{{ ac_charge_i_factor_float }}"
              integral_entity: !input integral_helper
              output_entity: !input active_power_number
              ac_charge_mode: true
          - delay:
              seconds: "{{ wait_time_int }}"

      # ZWEIG C: Normaler PI-Regler (Zone 1 / Zone 2)
      - conditions:
          - condition: template
            value_template: >
              {{ not (ac_charge_mode_active | bool(false)) and
                 not (tariff_charge_mode_active | bool(false)) and
                 grid_error_abs > tolerance_int and
                 not at_max_limit | bool(false) and
                 not at_min_limit | bool(false) }}
        sequence:
          - action: "{{ pi_script }}"
            data:
              grid_power: !input grid_power_sensor
              current_power: "{{ current_active_power }}"
              target_offset: "{{ target_offset }}"
              max_power: "{{ dynamic_max_power }}"
              tolerance: "{{ tolerance_int }}"
              p_factor: "{{ regulator_factor_float }}"
              i_factor: "{{ ki_factor_float }}"
              integral_entity: !input integral_helper
              output_entity: !input active_power_number
              ac_charge_mode: false
          - delay:
              seconds: "{{ wait_time_int }}"

    # STANDARD: Integral-Decay (Fehler innerhalb Toleranz oder At-Limit)
    default:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states(integral_entity) | float(0) | abs > 10 }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: !input integral_helper
                data:
                  value: "{{ (states(integral_entity) | float(0) * 0.95) | round(2) }}"
