blueprint:
  name: Solakon ONE Nulleinspeisung (DE) - Dynamisch & SOC-Gesteuert (V302)
  description: |
    ### Dynamische Nulleinspeisung mit SOC-Zonenlogik
      Dieser Home Assistant Blueprint implementiert eine dynamische Nulleinspeisung für den Solakon ONE Wechselrichter.
      Er nutzt einen PI-Regler (Proportional-Integral-Regler) zur präzisen Steuerung der AC-Ausgangsleistung und eine dreistufige State-of-Charge (SOC)-Logik zur effizienten Verwaltung des Batteriespeichers.
      Ziel dieses Blueprints ist es PV-Energie direkt auszugeben ohne den Umweg über die Batterie, dies verhindert das "flackern" das die App mit ihrer (lade ein Prozent -> entlade ein Prozent -> repeat) Funktionsweise verursacht und soll die Batterie schonen.

    ---

    ### 🧠 PI-Regler & Steuerlogik
    Der Kern des Blueprints ist ein PI-Regler (Proportional-Integral-Regler), der das AC-Output-Limit (Entladeleistung) dynamisch anpasst.
    * **Messprinzip:** Die Regelung basiert auf dem Shelly/Netzleistungssensor. **WICHTIG:** Positive Werte = Bezug, NEGATIVE WERTE = Einspeisung.
    * **P-Anteil (Proportional):** Reagiert auf die aktuelle Abweichung mit konfigurierbarer Aggressivität (Regelungs-Faktor).
    * **I-Anteil (Integral):** Summiert Abweichungen über die Zeit auf und eliminiert bleibende Regelabweichungen. Wird bei Zonenwechseln zurückgesetzt (Anti-Windup).

    ---

    ### 🔋 SOC-Zonenlogik (3 oder 4 Zonen je nach Konfiguration)

    #### 0. Zone: Überschuss-Einspeisung (Optional)
    * **Eintritts-Bedingung:** SOC ≥ konfigurierte Schwelle UND PV > Ausgangsleistung + Grid + PV-Hysterese.
    * **Aktion:** AC-Output-Limit auf Maximum, Entladestrom 2 A, Integral einfrieren.

    #### 1. Zone: Aggressive Regelung (Entladezyklus / Hoher SOC)
    * **Bedingung:** SOC > Zone-1-Schwelle ODER Entladezyklus aktiv.
    * **Aktion:** Max. Entladestrom auf konfigurierten Maximalwert. PI-Regler via externem Script.

    #### 2. Zone: Batterieschonende Regelung (Zwischen-SOC)
    * **Bedingung:** SOC zwischen Zone-3- und Zone-1-Schwelle, Entladezyklus inaktiv.
    * **Aktion:** Max. Entladestrom 0 A. PI-Regler via externem Script. Dynamisches PV-Limit.

    #### 3. Zone: Sicherheits-Stopp (Niedriger SOC)
    * **Bedingung:** SOC fällt unter den Unteren Schwellenwert.
    * **Aktion:** Sofortiges Umschalten auf Disabled, Output 0 W.

    ---

    ### ⚡ AC Laden (Optional)
    Laden der Batterie wenn externe Einspeisung erkannt wird.
    * **Eintritts-Bedingung:** AC Laden aktiv UND SOC < Ladeziel UND Modus = '1' UND (Grid + Output) < −Toleranz.
    * **Verbleib:** Modus bleibt '3' solange SOC < Ladeziel und Grid < Hysterese.
    * **PI-Regler:** Externes Script mit ac_charge_mode=true (invertierte Fehlerberechnung: target − grid).
    * **Abbruch:** SOC ≥ Ladeziel ODER Grid ≥ Hysterese.

  domain: automation
  source_url: https://github.com/D4nte85/Solakon-One-Nulleinspeisung-Blueprint-homeassistant/edit/experimentalAC/solakon_one_nulleinspeisung.yaml
  input:

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔌 NETZ-SENSOR (Extern - z.B. Shelly 3EM)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      netz_entitäten:
        name: "🔌 NETZ-SENSOR (Extern - z.B. Shelly 3EM):"
        collapsed: true
        input:
          grid_power_sensor:
            name: 🔌 Shelly/Netz-Leistungssensor (ERFORDERLICH)
            description: |
              Sensor für die aktuelle Netzleistung (z.B. Shelly 3EM).
              ⚠️ WICHTIG: Positive Werte = Bezug, NEGATIVE WERTE = Einspeisung.
            selector:
              entity:
                domain: sensor
                device_class: power

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚡ SOLAKON ONE - ENTITÄTEN
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      solakon_entitäten:
        name: "⚡ SOLAKON ONE - ENTITÄTEN:"
        collapsed: true
        input:
          actual_power_sensor:
            name: ⚡ Solakon ONE - Tatsächliche Ausgangsleistung
            description: Die tatsächliche AC-Ausgangsleistung des Wechselrichters.
            default: sensor.solakon_one_leistung
            selector:
              entity:
                domain: sensor
                device_class: power

          solar_power_sensor:
            name: ☀️ Solakon ONE - Solarleistung (PV-Erzeugung)
            description: Die aktuelle PV-Gesamterzeugung in Watt.
            default: sensor.solakon_one_pv_leistung
            selector:
              entity:
                domain: sensor
                device_class: power

          soc_sensor:
            name: 🔋 Solakon ONE - Batterieladestand (SOC)
            description: Der aktuelle Batterieladestand in %.
            default: sensor.solakon_one_batterie_ladestand
            selector:
              entity:
                domain: sensor
                device_class: battery

          remote_timeout_countdown_sensor:
            name: ⏱️ Solakon ONE - Remote Timeout Countdown
            description: Sensor, der den verbleibenden Timeout-Countdown anzeigt.
            default: sensor.solakon_one_fernsteuerung_zeituberschreitung
            selector:
              entity:
                domain: sensor

          active_power_number:
            name: ⚙️ Solakon ONE - Ausgangsleistungsregler
            description: Die Entität zum Setzen des Leistungs-Sollwerts (Remote Active Power).
            default: number.solakon_one_fernsteuerung_leistung
            selector:
              entity:
                domain: number

          max_discharge_current_number:
            name: 🔋 Solakon ONE - Max. Entladestrom
            description: Die Entität zur Steuerung des maximalen Entladestroms (A).
            default: number.solakon_one_maximaler_entladestrom
            selector:
              entity:
                domain: number

          remote_timeout_set_number:
            name: ⏲️ Solakon ONE - Modus-Reset-Timer
            description: Dient zum Setzen/Zurücksetzen des Remote-Timeouts (max. 3599 s).
            default: number.solakon_one_fernsteuerung_zeituberschreitung
            selector:
              entity:
                domain: number

          mode_select:
            name: 🔄 Solakon ONE - Betriebsmodus-Auswahl
            description: Die Entität zum Umschalten des Betriebsmodus (Remote Control Mode).
            default: select.solakon_one_modus_fernsteuern
            selector:
              entity:
                domain: select

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🛠️ HOME ASSISTANT HELPER (ERFORDERLICH!)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      homeassistant_helper:
        name: "🛠️ HOME ASSISTANT HELPER (ERFORDERLICH!):"
        collapsed: true
        input:
          cycle_active_boolean_helper:
            name: 🛠️ Entladezyklus-Zustandsspeicher (input_boolean - ERFORDERLICH!)
            description: |
              ⚠️ WICHTIG: Erstellen Sie einen Schalter Helfer (Input Boolean).
              Einstellungen → Geräte & Dienste → Helfer → Helfer erstellen → Schalter
              - Name: z.B. 'SOC Entladezyklus Status'
            default: input_boolean.soc_entladezyklus_status
            selector:
              entity:
                domain: input_boolean

          integral_helper:
            name: 🛠️ Integral-Speicher (input_number - ERFORDERLICH!)
            description: |
              ⚠️ WICHTIG: input_number Helper für den PI-Regler.
              Min: -1000, Max: 1000, Step: 1, Initial: 0
            default: input_number.solakon_integral
            selector:
              entity:
                domain: input_number

          PI_regler_script:
            name: 📜 PI-Regler Script (ERFORDERLICH!)
            description: Das aus dem "PI-Regler" Blueprint erstellte Script.
            default: script.pi_regler
            selector:
              entity:
                domain: script

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🎚️ REGELUNGS-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      PI_parameter:
        name: "🎚️ REGELUNGS-PARAMETER (PI):"
        collapsed: true
        input:
          regulator_factor:
            name: 🎛️ P-Faktor (Proportional-Verstärkung)
            description: P-Anteil des PI-Reglers (z.B. 1.5). Höher = aggressiver.
            default: 1.5
            selector:
              number:
                min: 0.1
                max: 5
                step: 0.1

          ki_factor:
            name: 🎛️ I-Faktor (Integral-Verstärkung)
            description: I-Anteil des PI-Reglers (z.B. 0.05). Höher = schnellere Korrektur.
            default: 0.05
            selector:
              number:
                min: 0.01
                max: 0.2
                step: 0.01

          tolerance:
            name: 📏 Toleranzbereich (Totband)
            description: Bereich in Watt um den Nullpunkt, in dem KEINE Korrektur stattfindet (z.B. ±25 W).
            default: 25
            selector:
              number:
                min: 0
                max: 200
                unit_of_measurement: W

          wait_time:
            name: ⏱️ Wartezeit nach setzen des Ausgangs
            description: |
              Verzögerung (in Sekunden) nach dem Setzen der Ausgangsleistung.
              ⚠️ WICHTIG: Modbus-Update-Einstellungen beachten!
            default: 3
            selector:
              number:
                min: 0
                max: 30
                step: 1
                unit_of_measurement: s

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔋 SOC-ZONEN-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      soc_parameter:
        name: "🔋 SOC-ZONEN-PARAMETER:"
        collapsed: true
        input:
          soc_fast_limit:
            name: 🔋 SOC-Schwelle "Zone 1 Start"
            description: |
              Obere Schwelle (z.B. 50 %). Überschreiten aktiviert Zone 1.
              Zone 1 läuft bis SOC < Zone-3-Schwelle fällt (kein Yo-Yo-Effekt).
            default: 50
            selector:
              number:
                min: 1
                max: 99
                unit_of_measurement: "%"

          soc_conservation_limit:
            name: 🔋 SOC-Schwelle "Zone 3 Stopp"
            description: Untere Schwelle (z.B. 20 %). Unterschreiten stoppt Entladung komplett.
            default: 20
            selector:
              number:
                min: 1
                max: 49
                unit_of_measurement: "%"

          default_discharge_current:
            name: 🔋 Max. Entladestrom in Zone 1 (Ampere)
            description: |
              Maximaler Entladestrom in Zone 1 (z.B. 40 A).
              In Zone 2 und AC Laden wird automatisch 0 A gesetzt.
            default: 40
            selector:
              number:
                min: 0
                max: 40
                unit_of_measurement: A

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚙️ ZONE 1/2 - PARAMETER/OFFSETS
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      zone_parameter:
        name: "⚙️ ZONE 1/2 - PARAMETER/OFFSETS:"
        collapsed: true
        input:
          offset_1:
            name: ⚙️ Zone 1 - Nullpunkt-Offset Statisch (Fallback)
            description: |
              Statischer Zielwert für Netzleistung in Zone 1 (z.B. 30 W).
              ⚠️ Wird auch als Regelziel beim AC Laden in Zone 1 verwendet.
            default: 30
            selector:
              number:
                min: 0
                max: 100
                unit_of_measurement: W

          offset_1_entity:
            name: ⚙️ Zone 1 - Dynamischer Nullpunkt-Offset (Optional)
            description: |
              Optionale input_number Entität für den dynamischen Offset in Zone 1.
              ⚠️ Wenn leer gelassen, wird der statische Wert oben verwendet.
            default: {}
            selector:
              entity:
                domain: input_number

          offset_2:
            name: ⚙️ Zone 2 - Nullpunkt-Offset Statisch (Fallback)
            description: |
              Statischer Zielwert für Netzleistung in Zone 2 (z.B. 30 W).
              ⚠️ Wird auch als Regelziel beim AC Laden in Zone 2 verwendet.
            default: 30
            selector:
              number:
                min: 0
                max: 100
                unit_of_measurement: W

          offset_2_entity:
            name: ⚙️ Zone 2 - Dynamischer Nullpunkt-Offset (Optional)
            description: |
              Optionale input_number Entität für den dynamischen Offset in Zone 2.
              ⚠️ Wenn leer gelassen, wird der statische Wert oben verwendet.
            default: {}
            selector:
              entity:
                domain: input_number

          pv_charge_reserve:
            name: ⚙️ Zone 2 - PV-Ladereserve
            description: |
              PV-Leistung, die in Zone 2 für Ladung reserviert wird (z.B. 50 W).
              Dynamische Obergrenze: Max. Entladung = PV - Reserve.
              ⚠️ Wird auch als PV-Schwelle für die Nachtabschaltung verwendet.
            default: 50
            selector:
              number:
                min: 0
                max: 1000
                unit_of_measurement: W

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔒 SICHERHEITS-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      safety_parameter:
        name: "🔒 SICHERHEITS-PARAMETER:"
        collapsed: true
        input:
          max_active_power_limit:
            name: 🔒 Maximale Ausgangsleistung (Hard Limit)
            description: Absolute Obergrenze der AC-Ausgangsleistung (z.B. 800 W).
            default: 800
            selector:
              number:
                min: 0
                max: 1200
                unit_of_measurement: W

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ☀️ ÜBERSCHUSS-EINSPEISUNG (Optional - Zone 0)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      surplus_parameter:
        name: "☀️ ÜBERSCHUSS-EINSPEISUNG (Optional - Zone 0):"
        collapsed: true
        input:
          surplus_export_enabled:
            name: ☀️ Überschuss-Einspeisung aktivieren
            description: |
              ✅ EIN: SOC ≥ Schwelle UND PV > Verbrauch + PV-Hysterese → Output auf Maximum.
              ❌ AUS: Klassische Nulleinspeisung.
            default: false
            selector:
              boolean:

          soc_export_limit:
            name: 🔋 SOC-Schwelle für Überschuss-Einspeisung
            description: |
              Ab diesem SOC (z.B. 90 %) wird bei PV-Überschuss ins Netz eingespeist.
              ⚠️ MUSS echt kleiner sein als das in der Solakon eingestellte max SOC!
            default: 90
            selector:
              number:
                min: 50
                max: 99
                unit_of_measurement: "%"

          surplus_exit_hysteresis:
            name: 🔋 Überschuss-Einspeisung Hysterese (SOC)
            description: |
              SOC muss um diesen Wert unter die Schwelle fallen bevor Zone 0 verlassen wird
              (z.B. 5 % → Austritt bei SOC < 85 % wenn Schwelle = 90 %).
            default: 5
            selector:
              number:
                min: 1
                max: 20
                unit_of_measurement: "%"

          surplus_pv_hysteresis:
            name: ☀️ PV-Überschuss Hysterese
            description: |
              Totband um den Hausverbrauch. Eintritt erst wenn PV um diesen Wert über dem
              Verbrauch liegt, Austritt wenn PV darunter fällt.
            default: 50
            selector:
              number:
                min: 10
                max: 200
                unit_of_measurement: W

          surplus_state_helper:
            name: ☀️ Surplus-Zustand Speicher (input_boolean - nur für Zone 0)
            description: |
              input_boolean Helper zum persistenten Tracken des Surplus-Zustands.
              ⚠️ Nur erforderlich wenn Überschuss-Einspeisung aktiviert ist.
            default: input_boolean.solakon_surplus_aktiv
            selector:
              entity:
                domain: input_boolean

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚡ AC LADEN (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      ac_charge_parameter:
        name: "⚡ AC LADEN (Optional):"
        description: |
          Laden der Batterie wenn externe Einspeisung erkannt wird (Grid + Output < −Toleranz).
          Aktiv in Zone 1 und Zone 2. SOC-Schutz (Zone 3) bleibt vollständig aktiv.
        collapsed: true
        input:
          ac_charge_enabled:
            name: ⚡ AC Laden aktivieren
            description: |
              ✅ EIN: Modus '1' UND (Grid + Output) < −Toleranz → Modus 3 (INV Charge PV Priority)
              ❌ AUS: Funktion deaktiviert
            default: false
            selector:
              boolean:

          soc_ac_charge_limit:
            name: 🔋 SOC-Ladeziel (%)
            description: |
              Laden stoppt wenn SOC diesen Wert erreicht.
              ⚠️ Empfohlen: ≤ Zone-1-Schwelle, damit nach dem Laden Zone 1 nahtlos übernimmt.
            default: 90
            selector:
              number:
                min: 10
                max: 99
                unit_of_measurement: "%"

          ac_charge_power_limit:
            name: 🔒 Max. Ladeleistung (W)
            description: Absolute Obergrenze der AC-Ladeleistung (z.B. 800 W).
            default: 800
            selector:
              number:
                min: 50
                max: 1200
                unit_of_measurement: W

          ac_charge_hysteresis:
            name: 📏 Hysterese Ladeabbruch (W)
            description: |
              Laden endet erst wenn Grid wieder über diesen Wert steigt.
              Verhindert Flackern bei wechselnder Einspeisung (z.B. 50 W).
            default: 50
            selector:
              number:
                min: 0
                max: 300
                unit_of_measurement: W

          ac_charge_state_helper:
            name: ⚡ AC-Lade-Zustand Speicher (input_boolean - nur für AC Laden)
            description: |
              input_boolean Helper zum persistenten Tracken des AC-Lade-Zustands.
              Signalisiert dem PI-Script die invertierte Fehlerberechnung (ac_charge_mode=true).
              ⚠️ Nur erforderlich wenn AC Laden aktiviert ist.
              Einstellungen → Helfer erstellen → Schalter
              - Name: z.B. 'Solakon AC Laden Aktiv'
            default: input_boolean.solakon_ac_laden_aktiv
            selector:
              entity:
                domain: input_boolean

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🌙 NACHTABSCHALTUNG (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      night_parameter:
        name: "🌙 NACHTABSCHALTUNG (Optional):"
        collapsed: true
        input:
          night_shutdown_enabled:
            name: 🌙 Nachtabschaltung aktivieren
            description: |
              Deaktiviert Zone 2 nachts automatisch (bei PV < PV-Ladereserve).
              ⚠️ Zone 1 und AC Laden laufen auch nachts weiter!
              ⚠️ Die PV-Schwelle für "Nacht" ist die PV-Ladereserve aus Zone 2 - Parameter.
            default: false
            selector:
              boolean:


mode: single
max_exceeded: silent

variables:
  # ===========================================
  # BLOCK 1: Variablen für Conditions & Modus-Logik
  # (Werden IMMER benötigt)
  # ===========================================

  # Grid / Solar / Actual Power
  grid_power: !input grid_power_sensor
  grid_power_float: "{{ states(grid_power) | float(0) }}"
  solar_power: !input solar_power_sensor
  solar_power_float: "{{ states(solar_power) | float(0) }}"
  actual_power_sensor: !input actual_power_sensor
  actual_power_float: "{{ states(actual_power_sensor) | float(0) }}"

  # Zonen-Schwellwerte
  soc_fast_limit_int: !input soc_fast_limit
  soc_conservation_limit_int: !input soc_conservation_limit

  # Aktuelle Sensorwerte für Conditions
  soc: !input soc_sensor
  timeout_countdown: !input remote_timeout_countdown_sensor
  solakon_mode: !input mode_select
  cycle_active: !input cycle_active_boolean_helper

  # Nachtabschaltung
  night_shutdown_enabled_bool: !input night_shutdown_enabled
  pv_charge_reserve_int: !input pv_charge_reserve

  # Toleranz (wird in Fall G benötigt)
  tolerance_int: !input tolerance

  # Helper-Entitäten
  integral_entity: !input integral_helper
  active_power_entity: !input active_power_number
  discharge_current_entity: !input max_discharge_current_number
  remote_timeout_set_number: !input remote_timeout_set_number

  # Parameter
  discharge_current_max: !input default_discharge_current

  # Surplus
  soc_export_limit_int: !input soc_export_limit
  surplus_exit_hysteresis_int: !input surplus_exit_hysteresis
  surplus_pv_hysteresis_int: !input surplus_pv_hysteresis
  surplus_export_enabled_bool: !input surplus_export_enabled
  surplus_state_entity: !input surplus_state_helper
  surplus_entity_valid: >
    {{ surplus_export_enabled_bool and
       surplus_state_entity is string and
       surplus_state_entity | length > 0 and
       states(surplus_state_entity) not in ['unknown', 'unavailable'] }}

  # AC Laden
  ac_charge_enabled_bool: !input ac_charge_enabled
  soc_ac_charge_limit_int: !input soc_ac_charge_limit
  ac_charge_power_limit_int: !input ac_charge_power_limit
  ac_charge_hysteresis_int: !input ac_charge_hysteresis
  ac_charge_state_entity: !input ac_charge_state_helper
  # Gültig wenn AC Laden aktiviert und Helper verfügbar
  ac_charge_entity_valid: >
    {{ ac_charge_enabled_bool and
       ac_charge_state_entity is string and
       ac_charge_state_entity | length > 0 and
       states(ac_charge_state_entity) not in ['unknown', 'unavailable'] }}

triggers:
  - trigger: state
    entity_id: !input grid_power_sensor
    id: grid_power_change

  - trigger: state
    entity_id: !input solar_power_sensor
    id: solar_power_change

  - trigger: numeric_state
    entity_id: !input soc_sensor
    above: !input soc_fast_limit
    id: soc_high

  - trigger: numeric_state
    entity_id: !input soc_sensor
    below: !input soc_conservation_limit
    id: soc_low

  - trigger: state
    entity_id: !input mode_select
    id: mode_change

actions:
  # -------------------------------------------------------------------------------------------------
  # PRÜFUNG: Check auf kritische Fehler
  # -------------------------------------------------------------------------------------------------
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ soc_fast_limit_int | float(0) <= soc_conservation_limit_int | float(0) }}"
              - condition: template
                value_template: >
                  {{ is_state(soc, 'unknown') or is_state(soc, 'unavailable') or
                     is_state(timeout_countdown, 'unknown') or is_state(timeout_countdown, 'unavailable') }}
        sequence:
          - action: system_log.write
            data:
              level: error
              message: "Solakon Fehler: SOC-Limits ungültig oder Entitäten offline. Abbruch."
          - stop: "Kritischer Fehler oder ungültige Konfiguration."

  # -------------------------------------------------------------------------------------------------
  # 0. ÜBERSCHUSS-LOGIK (ZONE 0) STATUS-UPDATE
  # -------------------------------------------------------------------------------------------------
  - choose:
      # FALL 0A: ÜBERSCHUSS STARTEN
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) }}"
          - condition: state
            entity_id: !input surplus_state_helper
            state: 'off'
          - condition: template
            value_template: >
              {{ (states(soc) | float(0) >= soc_export_limit_int) and
                 (solar_power_float > (actual_power_float + grid_power_float + surplus_pv_hysteresis_int)) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "☀️ Zone 0 aktiviert (Überschuss-Einspeisung startet)"
              entity_id: !input solar_power_sensor
          - action: input_boolean.turn_on
            target:
              entity_id: !input surplus_state_helper

      # FALL 0B: ÜBERSCHUSS BEENDEN
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) }}"
          - condition: state
            entity_id: !input surplus_state_helper
            state: 'on'
          - condition: template
            value_template: >
              {{ (states(soc) | float(0) < (soc_export_limit_int - surplus_exit_hysteresis_int)) or
                 (solar_power_float <= (actual_power_float + grid_power_float - surplus_pv_hysteresis_int)) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "☁️ Zone 0 deaktiviert (Überschuss-Einspeisung beendet)"
              entity_id: !input solar_power_sensor
          - action: input_boolean.turn_off
            target:
              entity_id: !input surplus_state_helper
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0

  # -------------------------------------------------------------------------------------------------
  # HAUPT-LOGIK: Modus- und Zyklus-Steuerung
  # Reihenfolge: A, B, C, D (vor G!), G, H, E, F
  # -------------------------------------------------------------------------------------------------
  - choose:
      # FALL A: ZONE 1 - Aggressive Entladung START
      - conditions:
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_fast_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🔋 Zone 1 aktiviert (Aggressive Entladung) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - action: input_boolean.turn_on
            target:
              entity_id: !input cycle_active_boolean_helper
          # Surplusmode zurücksetzen
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          # AC-Lade-Zustand zurücksetzen
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          # Modus → '1' (Timer-Toggle 3598↔3599)
          - choose:
              - conditions: "{{ states(solakon_mode) != '1' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'

      # FALL B: ZONE 3 - Sicherheits-STOPP (Zyklus ON)
      - conditions:
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_conservation_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🛑 Zone 3 aktiviert (Sicherheits-Stopp) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - action: input_boolean.turn_off
            target:
              entity_id: !input cycle_active_boolean_helper
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          - choose:
              - conditions: "{{ states(solakon_mode) != '0' }}"
                sequence:
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '0'
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0

      # FALL C: ZONE 3 - Absicherung (Zyklus OFF, Modus noch aktiv)
      - conditions:
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_conservation_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) != '0' }}"
        sequence:
          - choose:
              - conditions: "{{ states(solakon_mode) != '0' }}"
                sequence:
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '0'
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0

      # FALL D: Recovery - Modus fiel ab, Zyklus noch aktiv
      # VOR Fall G! Excludiert Modus '3' (AC Laden läuft ungestört weiter).
      - conditions:
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
          - condition: template
            value_template: "{{ states(solakon_mode) not in ['1', '3'] }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_conservation_limit_int }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '1'

      # FALL G: AC LADEN — Eintritt
      # Guard: Modus muss '1' sein — verhindert Eintritt aus Modus '0' (unkontrolliert, actual_power=0)
      - conditions:
          - condition: template
            value_template: "{{ ac_charge_enabled_bool }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_ac_charge_limit_int }}"
          - condition: template
            value_template: "{{ states(solakon_mode) == '1' }}"
          - condition: template
            value_template: "{{ (grid_power_float + actual_power_float) < (-1 * (tolerance_int | float(0))) }}"
        sequence:
          - action: logbook.log
            data:
              name: Solakon AC Laden
              message: >
                ⚡ AC Laden aktiviert
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Grid: {{ grid_power_float }}W, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          # AC-Lade-Zustand setzen
          - action: input_boolean.turn_on
            target:
              entity_id: !input ac_charge_state_helper
          # Timer-Toggle + Modus → '3' (INV Charge PV Priority)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '3'
          # Output auf 0 W nullen (PI startet sauber)
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0

      # FALL H: AC LADEN BEENDEN
      - conditions:
          - condition: template
            value_template: "{{ ac_charge_enabled_bool and states(solakon_mode) == '3' }}"
          - condition: template
            value_template: >
              {{ states(soc) | float(0) >= soc_ac_charge_limit_int or
                 grid_power_float >= (ac_charge_hysteresis_int | float(0)) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon AC Laden
              message: >
                ⚡ AC Laden beendet
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Grid: {{ grid_power_float }}W, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # AC-Lade-Zustand zurücksetzen
          - action: input_boolean.turn_off
            target:
              entity_id: !input ac_charge_state_helper
          # Zone 1 → Modus '1' (Timer-Toggle) | Zone 2 → Disabled + 0 W
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'
            default:
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '0'
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: 0

      # FALL E: ZONE 2 - Batterieschonend START
      - conditions:
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_conservation_limit_int and states(soc) | float(0) <= soc_fast_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) == '0' }}"
          - condition: template
            value_template: >
              {{ not night_shutdown_enabled_bool or
                 (states(solar_power) | float(0)) >= pv_charge_reserve_int | float(0) }}
        sequence:
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🔋 Zone 2 aktiviert (Batterieschonend) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - choose:
              - conditions: "{{ states(solakon_mode) != '1' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'

      # FALL F: Nachtabschaltung (Zone 2 bei PV < PV-Ladereserve)
      - conditions:
          - condition: template
            value_template: "{{ night_shutdown_enabled_bool }}"
          - condition: template
            value_template: "{{ (states(solar_power) | float(0)) < pv_charge_reserve_int | float(0) }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) != '0' }}"
        sequence:
          - action: logbook.log
            data:
              name: Solakon Nachtmodus
              message: "🌙 Nachtabschaltung aktiviert (Zone 2) - PV: {{ states(solar_power) }}W"
              entity_id: !input solar_power_sensor
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0

  # -------------------------------------------------------------------------------------------------
  # PI-GATE: NUR ausführen wenn Modus '1' oder '3' UND (Zone 1 ODER Tag)
  # -------------------------------------------------------------------------------------------------
  - condition: template
    value_template: >
      {{ states(solakon_mode) in ['1', '3'] and
         (is_state(cycle_active, 'on') or
          not night_shutdown_enabled_bool or
          (states(solar_power) | float(0)) >= pv_charge_reserve_int | float(0)) }}

  # ===========================================
  # BLOCK 2: Variablen NUR für PI-Regler
  # ===========================================
  - variables:
      # Frische Sensorwerte zum Zeitpunkt der PI-Berechnung
      grid_power_float: "{{ states(grid_power) | float(0) }}"
      solar_power_float: "{{ states(solar_power) | float(0) }}"

      # Konfiguration
      wait_time_int: !input wait_time
      pi_script: !input PI_regler_script
      max_active_power_limit_int: !input max_active_power_limit
      regulator_factor_float: !input regulator_factor
      ki_factor_float: !input ki_factor
      offset_1_static: !input offset_1
      offset_1_entity_id: !input offset_1_entity
      offset_2_static: !input offset_2
      offset_2_entity_id: !input offset_2_entity

      # Dynamischer Offset
      offset_1_int: >
        {% if offset_1_entity_id is string and offset_1_entity_id | length > 0 and states(offset_1_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(offset_1_entity_id) | float(offset_1_static) }}
        {% else %}
          {{ offset_1_static }}
        {% endif %}
      offset_2_int: >
        {% if offset_2_entity_id is string and offset_2_entity_id | length > 0 and states(offset_2_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(offset_2_entity_id) | float(offset_2_static) }}
        {% else %}
          {{ offset_2_static }}
        {% endif %}
      target_offset: >
        {% if is_state(cycle_active, 'on') %}
          {{ offset_1_int }}
        {% else %}
          {{ offset_2_int }}
        {% endif %}

      # PI-Regler-Variablen
      current_active_power: "{{ states(active_power_entity) | float(0) }}"
      integral_old: "{{ states(integral_entity) | float(0) }}"

      # Dynamisches Power-Limit (zonenabhängig)
      # Modus '3' (AC Laden) → Lade-Limit als max_power ans Script
      # Zone 1               → Hard Limit
      # Zone 2               → Max(0, PV - Reserve)
      dynamic_max_power: >
        {% if states(solakon_mode) == '3' %}
          {{ ac_charge_power_limit_int }}
        {% elif is_state(cycle_active, 'on') %}
          {{ max_active_power_limit_int }}
        {% else %}
          {{ [0, solar_power_float - (pv_charge_reserve_int | float(0))] | max }}
        {% endif %}

      # AC-Lade-Modus aktiv? Aus persistentem Helper lesen.
      ac_charge_mode_active: "{{ ac_charge_entity_valid | bool(false) and is_state(ac_charge_state_entity, 'on') }}"

      # Fehler für Guards (immer in Entlade-Richtung: grid − offset)
      # Absolutwert ist für beide Modi (normal + AC) identisch → grid_error_abs gilt für Toleranzprüfung
      raw_error: "{{ grid_power_float - (target_offset | float(0)) }}"
      grid_error_abs: "{{ (grid_power_float - (target_offset | float(0))) | abs }}"

      # At-Limit Guards — nur für normalen Entlade-Modus relevant
      # Im AC-Modus ist die Fehlerrichtung invertiert, Guards würden PI fälschlich blockieren
      at_max_limit: "{{ raw_error > 0 and current_active_power >= dynamic_max_power | float(0) }}"
      at_min_limit: "{{ raw_error < 0 and current_active_power <= 0 }}"


  # SCHRITT 1: Entladestrom setzen
  - choose:
      # FALL 1a: Zone 1 — Max-Wert (nur wenn Surplus NICHT aktiv UND NICHT AC Laden)
      - conditions:
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
          - condition: template
            value_template: >
              {{ states(solakon_mode) != '3' and
                 not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != discharge_current_max | float(0) | round(2) }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: "{{ discharge_current_max }}"

      # FALL 1b: Zone 0 (Surplus) — Stabilitätspuffer 2 A
      - conditions:
          - condition: template
            value_template: >
              {{ (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != 2 }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: 2

      # FALL 1c: Zone 2 oder AC Laden — 0 A
      - conditions:
          - condition: template
            value_template: >
              {{ (is_state(cycle_active, 'off') or states(solakon_mode) == '3') and
                 not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != 0 }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: 0

  # SCHRITT 2: Timeout-Reset (Timer-Toggle 3598↔3599)
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ states(timeout_countdown) | int(9999) < 120 }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599

  # SCHRITT 3: Ausgangsleistung setzen + Integral verwalten
  - choose:
      # ZWEIG A: Zone 0 — Überschuss (Hard Limit + Integral einfrieren)
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on') }}"
        sequence:
          - parallel:
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: "{{ max_active_power_limit_int }}"
              - action: input_number.set_value
                target:
                  entity_id: !input integral_helper
                data:
                  value: "{{ integral_old }}"
          - delay:
              seconds: "{{ wait_time_int }}"

      # ZWEIG B: AC Laden — PI-Script mit ac_charge_mode=true (invertierte Fehlerberechnung)
      # at_max/at_min Guards entfallen: Fehlerrichtung ist im Script invertiert
      - conditions:
          - condition: template
            value_template: "{{ ac_charge_mode_active and grid_error_abs > tolerance_int }}"
        sequence:
          - action: "{{ pi_script }}"
            data:
              grid_power: !input grid_power_sensor
              current_power: "{{ current_active_power }}"
              target_offset: "{{ target_offset }}"
              max_power: "{{ dynamic_max_power }}"
              tolerance: "{{ tolerance_int }}"
              p_factor: "{{ regulator_factor_float }}"
              i_factor: "{{ ki_factor_float }}"
              integral_entity: !input integral_helper
              output_entity: !input active_power_number
              ac_charge_mode: true
          - delay:
              seconds: "{{ wait_time_int }}"

      # ZWEIG C: Normaler PI-Regler (Zone 1 / Zone 2)
      - conditions:
          - condition: template
            value_template: >
              {{ not ac_charge_mode_active and
                 grid_error_abs > tolerance_int and
                 not at_max_limit | bool(false) and
                 not at_min_limit | bool(false) }}
        sequence:
          - action: "{{ pi_script }}"
            data:
              grid_power: !input grid_power_sensor
              current_power: "{{ current_active_power }}"
              target_offset: "{{ target_offset }}"
              max_power: "{{ dynamic_max_power }}"
              tolerance: "{{ tolerance_int }}"
              p_factor: "{{ regulator_factor_float }}"
              i_factor: "{{ ki_factor_float }}"
              integral_entity: !input integral_helper
              output_entity: !input active_power_number
              ac_charge_mode: false
          - delay:
              seconds: "{{ wait_time_int }}"

    # STANDARD: Integral-Decay (Fehler innerhalb Toleranz oder At-Limit)
    default:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states(integral_entity) | float(0) | abs > 10 }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: !input integral_helper
                data:
                  value: "{{ (states(integral_entity) | float(0) * 0.95) | round(2) }}"
