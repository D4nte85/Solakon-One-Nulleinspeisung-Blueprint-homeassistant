blueprint:
  name: Solakon ONE Nulleinspeisung (DE) - Dynamisch & SOC-Gesteuert (V303)
  description: |
    Dynamische Nulleinspeisung für den Solakon ONE Wechselrichter mit PI-Regler, SOC-Zonenlogik,
    optionaler Überschuss-Einspeisung, optionalem AC Laden und optionaler Tarif-Arbitrage.

    <details>
    <summary><b>🧠 PI-Regler & Steuerlogik</b> 👈</summary>

    Der Kern des Blueprints ist ein PI-Regler, der das AC-Output-Limit dynamisch anpasst.
    Die Rechenlogik ist in ein separates Script-Blueprint (`PI-Regler`) ausgelagert.

    - **Regelgröße:** Netzleistung (Shelly/Stromzähler). Positiv = Bezug, negativ = Einspeisung.
    - **Stellgröße:** AC-Ausgangsleistung des Wechselrichters.
    - **P-Anteil:** Reagiert sofort auf die aktuelle Abweichung vom Sollwert.
    - **I-Anteil:** Summiert Abweichungen über die Zeit auf — eliminiert bleibende Regelabweichungen.
    - **Anti-Windup:** Integral wird auf ±1000 begrenzt (im Script).
    - **Integral-Reset:** Bei jedem Zonenwechsel auf 0.
    - **Integral-Decay:** 5 % Abbau pro Zyklus solange Fehler ≤ Toleranz und |Integral| > 10 (in Hauptautomatisierung).
    - **Integral-Einfrieren:** In Zone 0 (Überschuss) kein Decay, kein PI-Aufruf.
    - **Fehlerberechnung (modusabhängig, im Script):**
      - Normal (`ac_charge_mode=false`): `raw_error = grid − target_offset`
      - AC Laden (`ac_charge_mode=true`): `raw_error = target_offset − grid` (invertiert)
    - **Kapazitäts-Clamping:** Fehler wird auf tatsächlich verfügbare Kapazität begrenzt.
    - **Dynamisches Power-Limit (`max_power` ans Script):**
      - Zone 1: Hard Limit
      - Zone 2: `Max(0, PV − Reserve)`
      - AC Laden (Modus `'3'`): konfigurierbares Lade-Limit
    - **PI-Aufruf-Guard:**
      - Zone 0 aktiv → kein PI-Aufruf, Integral eingefroren
      - Tarif-Laden aktiv → direkte Leistungssetzung, kein PI
      - AC Laden aktiv → PI mit `ac_charge_mode=true`, `at_max/at_min`-Guards deaktiviert
      - Normal → PI nur wenn `|Fehler| > Toleranz` UND kein At-Limit
    - **Separate P/I-Faktoren für AC Laden:** Wegen langer Hardware-Flanke (~25 s) empfiehlt sich ein kleiner P-Faktor (~0.3–0.5); der I-Anteil macht die eigentliche Regelarbeit.

    </details>

    <details>
    <summary><b>🔋 SOC-Zonenlogik</b> 👈</summary>

    | Zone | Bedingung | Modus | Entladestrom | Besonderheit |
    |:-----|:----------|:------|:------------|:-------------|
    | **0 — Überschuss** | SOC ≥ Export-Schwelle UND PV > Output + Grid + PV-Hysterese | `'1'` | 2 A | Optional. Integral eingefroren. |
    | **1 — Aggressiv** | SOC > Zone-1-Schwelle | `'1'` | Max (z.B. 40 A) | Läuft bis SOC ≤ Zone-3-Schwelle. Auch nachts aktiv. |
    | **2 — Batterieschonend** | Zone-3 < SOC ≤ Zone-1, Zyklus = off | `'1'` | 0 A | Dynamisches Limit: `Max(0, PV − Reserve)`. Optional: Nachtabschaltung. |
    | **3 — Sicherheitsstopp** | SOC ≤ Zone-3-Schwelle | `'0'` | 0 A | Output = 0 W. Vollständiger Batterieschutz. Hat immer Vorrang. |

    **Steuer-Falls (Reihenfolge ist entscheidend):**
    - **A** — Zone 1 Start: SOC > Zone-1-Schwelle UND Zyklus = `off` UND kein AC/Tarif-Laden UND keine Entladesperre → Integral = 0, Zyklus = `on`, Surplus/AC-Bool zurücksetzen, Timer-Toggle, Modus → `'1'`
    - **B** — Zone 3 Stop: SOC < Zone-3-Schwelle UND Zyklus = `on` UND kein AC/Tarif-Laden → Integral = 0, Zyklus = `off`, Surplus/AC-Bool zurücksetzen, Output → 0W, Modus → `'0'`
    - **C** — Zone 3 Absicherung: SOC < Zone-3-Schwelle UND Zyklus = `off` UND Modus ≠ `'0'` UND kein AC/Tarif-Laden → Surplus/AC-Bool zurücksetzen, Output → 0W, Modus → `'0'`
    - **D** — Recovery: Zyklus = `on` UND Modus ∉ `{'1','3'}` UND SOC > Zone-3-Schwelle → Timer-Toggle, Modus → `'3'` wenn AC- **oder** Tarif-Lade-Bool = `on`, sonst `'1'` (kein Integral-Reset, kein Zonenwechsel)
    - **GT** — Tarif-Laden Start: Tarif-Arbitrage aktiv UND Preis < Günstig-Schwelle UND SOC < Tarif-Ladeziel UND Modus ≠ `'3'` UND kein Überschuss → Tarif-Bool = `on`, Timer-Toggle, Output → Ladeleistung (direkt), Modus → `'3'`
    - **HT** — Tarif-Laden Ende: Modus = `'3'` UND Tarif-Bool = `on` UND (Preis ≥ Günstig-Schwelle ODER SOC ≥ Ladeziel) → Integral = 0, Tarif-Bool = `off`, Zone 1: Timer-Toggle + Modus `'1'` / Zone 2: Modus `'0'` + 0W
    - **TM** — Entladesperre (Mittelpreis): Tarif aktiv UND Günstig ≤ Preis < Teuer UND kein Laden UND Modus = `'1'` → Integral = 0, Zyklus = `off` (wenn Zone 1), Output → 0W, Modus → `'0'`
    - **G** — AC Laden Start: AC aktiv UND SOC < Ladeziel UND Modus ≠ `'3'` UND (Grid + Output) < −Hysterese UND kein Tarif-Laden UND kein Überschuss → AC-Bool = `on`, Timer-Toggle, Output → 0W, Modus → `'3'`
    - **H** — AC Laden Ende: Modus = `'3'` UND (SOC ≥ Ladeziel ODER (Grid ≥ Offset + Hysterese UND Output = 0W)) → Integral = 0, AC-Bool = `off`, Zone 1: Output → 0W, Timer-Toggle, Modus → `'1'` / Zone 2: Output → 0W, Modus → `'0'`
    - **I** — Safety: Modus = `'3'` ohne aktive AC- oder Tarif-Lade-Session → Integral = 0, Zone 1: Output → 0W, Timer-Toggle, Modus → `'1'` / Zone 2: Output → 0W, Modus → `'0'`
    - **E** — Zone 2 Start: Zone-3 < SOC ≤ Zone-1 UND Zyklus = `off` UND Modus = `'0'` UND NICHT Nacht UND keine Entladesperre → Integral = 0, Timer-Toggle, Modus → `'1'`
    - **F** — Nachtabschaltung: Nacht UND PV < PV-Ladereserve UND Zyklus = `off` UND Modus aktiv UND kein AC/Tarif-Laden → Integral = 0, Output → 0W, Modus → `'0'`

    **Timer-Toggle:** Statt eines festen Werts wird zwischen 3598 und 3599 gewechselt — erzeugt eine Zustandsänderung damit der Solakon den neuen Modus sicher übernimmt. Wird bei jedem Moduswechsel direkt vor dem Modus-Setzen durchgeführt.

    </details>

    <details>
    <summary><b>☀️ Überschuss-Einspeisung (Zone 0, Optional)</b> 👈</summary>

    Ermöglicht aktives Einspeisen von PV-Überschuss wenn der Akku voll ist.

    - **Eintritt:** SOC ≥ Export-Schwelle UND (PV > (Output + Grid + PV-Hysterese) ODER PV = 0)
    - **Austritt:** SOC < (Export-Schwelle − SOC-Hysterese) ODER PV ≤ (Output + Grid − PV-Hysterese)
    - **Persistenz:** Zustand in `input_boolean` — überlebt mehrere Automation-Läufe
    - **Verhalten:** Output → Hard Limit, Entladestrom → 2 A (Stabilitätspuffer), Integral eingefroren
    - **Hysterese:** Doppelte Absicherung (SOC + PV) verhindert instabiles Hin- und Herschalten
    - **Deaktiviert:** Klassische Nulleinspeisung, kein aktives Einspeisen

    </details>

    <details>
    <summary><b>⚡ AC Laden (Optional)</b> 👈</summary>

    Lädt die Batterie wenn eine externe Einspeisung ins Netz erkannt wird.
    Erkennung: `(Grid + Ausgangsleistung) < −Hysterese` — d.h. nach Abzug des Solakon-Beitrags liegt noch Überschuss an.
    Typischer Anwendungsfall: externe PV-Anlage speist Überschuss ins Netz.

    - **Eintritt (Fall G):** AC Laden aktiviert UND SOC < Ladeziel UND Modus ≠ `'3'` UND (Grid + Output) < −Hysterese UND kein Tarif-Laden UND kein Überschuss
      - Guard `Modus ≠ '3'` verhindert Re-Eintritt wenn AC Laden bereits läuft
    - **Verbleib:** Modus `'3'` solange SOC < Ladeziel UND Grid < (Offset + Hysterese)
    - **Abbruch (Fall H):** SOC ≥ Ladeziel ODER (Grid ≥ Offset + Hysterese UND Output = 0 W)
      - `Output = 0 W`-Guard verhindert Fehlauslösung während PI noch regelt
    - **PI-Regelung:** `ac_charge_mode=true` → invertierte Fehlerberechnung: `target_offset − grid`
      - Positiver Fehler (Grid zu negativ) → Ladeleistung erhöhen
      - `at_max/at_min`-Guards deaktiviert (Richtung invertiert)
    - **Separate P/I-Faktoren:** P klein (~0.3–0.5), I macht die eigentliche Regelarbeit
    - **Rückkehr:**
      - Zone 1 → Integral = 0, AC-Bool = `off`, Output → 0 W, Timer-Toggle, Modus → `'1'`
      - Zone 2 → Integral = 0, AC-Bool = `off`, Output → 0 W, Modus → `'0'`
    - **Priorität:** Zone 3 (SOC-Schutz) hat immer Vorrang. Tarif-Laden hat Vorrang vor AC-Laden.

    </details>

    <details>
    <summary><b>💹 Tarif-Arbitrage (Optional)</b> 👈</summary>

    Lädt die Batterie bei günstigem Strompreis und sperrt die Entladung im mittleren Preisbereich.
    Sensor-Einheit und Schwellwerte müssen übereinstimmen — kein Blueprint-seitiges Umrechnen.

    | Preiszone | Verhalten |
    |:----------|:----------|
    | `Preis < Günstig-Schwelle` | Tarif-Laden aktiv (Fall GT) — direkte Leistungssetzung, kein PI |
    | `Günstig ≤ Preis < Teuer-Schwelle` | Nur Entladesperre (Fall TM) — Zone 1 und Zone 2 werden gestoppt |
    | `Preis ≥ Teuer-Schwelle` | Normale SOC-Zonen-Logik — kein Eingriff |

    - **Eintritt Tarif-Laden (Fall GT):** Preis < Günstig-Schwelle UND SOC < Ladeziel UND Modus ≠ `'3'` UND kein Überschuss aktiv
    - **Abbruch (Fall HT):** Preis ≥ Günstig-Schwelle ODER SOC ≥ Ladeziel (Sensor-Ausfall stoppt NICHT — schützt aktive Ladesession)
    - **Entladesperre (Fall TM):** Modus = `'1'` UND kein Laden aktiv UND Preis < Teuer-Schwelle → Entladung stoppen, Modus → `'0'`
    - **Reaktivierung:** Falls A/E können nur starten wenn Preis ≥ Teuer-Schwelle
    - **Sensor-Ausfall:** Weder Laden noch Sperre — System verhält sich wie ohne Tarif-Arbitrage
    - **Priorität:** Tarif-Laden (GT) hat Vorrang vor AC-Laden (G). Zone 0 (Überschuss) blockiert Tarif-Laden.

    </details>

    <details>
    <summary><b>🌙 Nachtabschaltung (Optional)</b> 👈</summary>

    Betrifft **nur Zone 2** (Fall F). Zone 1 und AC Laden laufen auch nachts weiter.

    - **Schwelle:** PV-Leistung unter dem Wert der PV-Ladereserve (kein separater Parameter)
    - **Verhalten:** Modus → `'0'`, Integral reset, Output 0 W
    - **Zone 1:** Läuft durch — hoher SOC, aggressive Entladung weiterhin gewünscht
    - **Zone 2 Reaktivierung:** Sobald PV wieder über die PV-Ladereserve steigt, greift Fall E

    </details>

  domain: automation
  source_url: https://github.com/D4nte85/Solakon-One-Nulleinspeisung-Blueprint-homeassistant/edit/main/solakon_one_nulleinspeisung.yaml
  input:

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔌 NETZ-SENSOR (Extern - z.B. Shelly 3EM)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      netz_entitäten:
        name: "🔌 NETZ-SENSOR (Extern - z.B. Shelly 3EM):"
        collapsed: true
        input:
          grid_power_sensor:
            name: 🔌 Shelly/Netz-Leistungssensor (ERFORDERLICH)
            description: |
              Sensor für die aktuelle Netzleistung (z.B. Shelly 3EM).
              ⚠️ WICHTIG: Positive Werte = Bezug, NEGATIVE WERTE = Einspeisung.
            selector:
              entity:
                domain: sensor
                device_class: power

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚡ SOLAKON ONE - ENTITÄTEN
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      solakon_entitäten:
        name: "⚡ SOLAKON ONE - ENTITÄTEN:"
        collapsed: true
        input:
          actual_power_sensor:
            name: ⚡ Solakon ONE - Tatsächliche Ausgangsleistung
            description: Die tatsächliche AC-Ausgangsleistung des Wechselrichters.
            default: sensor.solakon_one_leistung
            selector:
              entity:
                domain: sensor
                device_class: power

          solar_power_sensor:
            name: ☀️ Solakon ONE - Solarleistung (PV-Erzeugung)
            description: Die aktuelle PV-Gesamterzeugung in Watt.
            default: sensor.solakon_one_pv_leistung
            selector:
              entity:
                domain: sensor
                device_class: power

          soc_sensor:
            name: 🔋 Solakon ONE - Batterieladestand (SOC)
            description: Der aktuelle Batterieladestand in %.
            default: sensor.solakon_one_batterie_ladestand
            selector:
              entity:
                domain: sensor
                device_class: battery

          remote_timeout_countdown_sensor:
            name: ⏱️ Solakon ONE - Remote Timeout Countdown
            description: Sensor, der den verbleibenden Timeout-Countdown anzeigt.
            default: sensor.solakon_one_fernsteuerung_zeituberschreitung
            selector:
              entity:
                domain: sensor

          active_power_number:
            name: ⚙️ Solakon ONE - Ausgangsleistungsregler
            description: Die Entität zum Setzen des Leistungs-Sollwerts (Remote Active Power).
            default: number.solakon_one_fernsteuerung_leistung
            selector:
              entity:
                domain: number

          max_discharge_current_number:
            name: 🔋 Solakon ONE - Max. Entladestrom
            description: Die Entität zur Steuerung des maximalen Entladestroms (A).
            default: number.solakon_one_maximaler_entladestrom
            selector:
              entity:
                domain: number

          remote_timeout_set_number:
            name: ⏲️ Solakon ONE - Modus-Reset-Timer
            description: Dient zum Setzen/Zurücksetzen des Remote-Timeouts (max. 3599 s).
            default: number.solakon_one_fernsteuerung_zeituberschreitung
            selector:
              entity:
                domain: number

          mode_select:
            name: 🔄 Solakon ONE - Betriebsmodus-Auswahl
            description: Die Entität zum Umschalten des Betriebsmodus (Remote Control Mode).
            default: select.solakon_one_modus_fernsteuern
            selector:
              entity:
                domain: select

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🛠️ HOME ASSISTANT HELPER (ERFORDERLICH!)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      homeassistant_helper:
        name: "🛠️ HOME ASSISTANT HELPER (ERFORDERLICH!):"
        collapsed: true
        input:
          cycle_active_boolean_helper:
            name: 🛠️ Entladezyklus-Zustandsspeicher (input_boolean - ERFORDERLICH!)
            description: |
              ⚠️ WICHTIG: Erstellen Sie einen Schalter Helfer (Input Boolean).
              Einstellungen → Geräte & Dienste → Helfer → Helfer erstellen → Schalter
              - Name: z.B. 'SOC Entladezyklus Status'
            default: input_boolean.soc_entladezyklus_status
            selector:
              entity:
                domain: input_boolean

          integral_helper:
            name: 🛠️ Integral-Speicher (input_number - ERFORDERLICH!)
            description: |
              ⚠️ WICHTIG: input_number Helper für den PI-Regler.
              Min: -1000, Max: 1000, Step: 1, Initial: 0
            default: input_number.solakon_integral
            selector:
              entity:
                domain: input_number

          PI_regler_script:
            name: 📜 PI-Regler Script (ERFORDERLICH!)
            description: Das aus dem "PI-Regler" Blueprint erstellte Script.
            default: script.pi_regler
            selector:
              entity:
                domain: script

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🎚️ REGELUNGS-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      PI_parameter:
        name: "🎚️ REGELUNGS-PARAMETER (PI):"
        collapsed: true
        input:
          regulator_factor:
            name: 🎛️ P-Faktor (Proportional-Verstärkung)
            description: P-Anteil des PI-Reglers (z.B. 1.3). Höher = aggressiver.
            default: 1.3
            selector:
              number:
                min: 0.1
                max: 5
                step: 0.1

          ki_factor:
            name: 🎛️ I-Faktor (Integral-Verstärkung)
            description: I-Anteil des PI-Reglers (z.B. 0.05). Höher = schnellere Korrektur.
            default: 0.05
            selector:
              number:
                min: 0
                max: 0.2
                step: 0.01

          tolerance:
            name: 📏 Toleranzbereich (Totband)
            description: Bereich in Watt um den Nullpunkt, in dem KEINE Korrektur stattfindet (z.B. ±25 W).
            default: 25
            selector:
              number:
                min: 0
                max: 200
                unit_of_measurement: W

          wait_time:
            name: ⏱️ Wartezeit nach setzen des Ausgangs
            description: |
              Verzögerung (in Sekunden) nach dem Setzen der Ausgangsleistung.
              Kompensiert die Reaktionszeit des Wechselrichters bevor der nächste
              Trigger ausgewertet wird (z.B. 3 s).
            default: 3
            selector:
              number:
                min: 0
                max: 30
                step: 1
                unit_of_measurement: s

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔋 SOC-ZONEN-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      soc_parameter:
        name: "🔋 SOC-ZONEN-PARAMETER:"
        collapsed: true
        input:
          soc_fast_limit:
            name: 🔋 SOC-Schwelle "Zone 1 Start"
            description: |
              Obere Schwelle (z.B. 50 %). Überschreiten aktiviert Zone 1.
              Zone 1 läuft bis SOC unter die Zone-3-Schwelle fällt (kein Yo-Yo-Effekt).
            default: 50
            selector:
              number:
                min: 1
                max: 99
                unit_of_measurement: "%"

          soc_conservation_limit:
            name: 🔋 SOC-Schwelle "Zone 3 Stopp"
            description: Untere Schwelle (z.B. 20 %). Unterschreiten stoppt Entladung komplett.
            default: 20
            selector:
              number:
                min: 1
                max: 49
                unit_of_measurement: "%"

          default_discharge_current:
            name: 🔋 Max. Entladestrom in Zone 1 (Ampere)
            description: |
              Maximaler Entladestrom in Zone 1 (z.B. 40 A).
              In Zone 2 und AC Laden wird automatisch 0 A gesetzt.
            default: 40
            selector:
              number:
                min: 0
                max: 40
                unit_of_measurement: A

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚙️ ZONE 1/2 - PARAMETER/OFFSETS
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      zone_parameter:
        name: "⚙️ ZONE 1/2 - PARAMETER/OFFSETS:"
        collapsed: true
        input:
          offset_1:
            name: ⚙️ Zone 1 - Nullpunkt-Offset Statisch (Fallback)
            description: |
              Statischer Zielwert für Netzleistung in Zone 1 (z.B. 30 W).
            default: 30
            selector:
              number:
                min: -100
                max: 100
                unit_of_measurement: W

          offset_1_entity:
            name: ⚙️ Zone 1 - Dynamischer Nullpunkt-Offset (Optional)
            description: |
              Optionale input_number Entität für den dynamischen Offset in Zone 1.
              ⚠️ Wenn leer gelassen, wird der statische Wert oben verwendet.
            default: {}
            selector:
              entity:
                domain: input_number

          offset_2:
            name: ⚙️ Zone 2 - Nullpunkt-Offset Statisch (Fallback)
            description: |
              Statischer Zielwert für Netzleistung in Zone 2 (z.B. 30 W).
            default: 30
            selector:
              number:
                min: -100
                max: 100
                unit_of_measurement: W

          offset_2_entity:
            name: ⚙️ Zone 2 - Dynamischer Nullpunkt-Offset (Optional)
            description: |
              Optionale input_number Entität für den dynamischen Offset in Zone 2.
              ⚠️ Wenn leer gelassen, wird der statische Wert oben verwendet.
            default: {}
            selector:
              entity:
                domain: input_number

          pv_charge_reserve:
            name: ⚙️ Zone 2 - PV-Ladereserve
            description: |
              PV-Leistung, die in Zone 2 für Ladung reserviert wird (z.B. 50 W).
              Dynamische Obergrenze: Max. Entladung = PV - Reserve.
              ⚠️ Wird auch als PV-Schwelle für die Nachtabschaltung verwendet.
            default: 50
            selector:
              number:
                min: 0
                max: 1000
                unit_of_measurement: W

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔒 SICHERHEITS-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      safety_parameter:
        name: "🔒 SICHERHEITS-PARAMETER:"
        collapsed: true
        input:
          max_active_power_limit:
            name: 🔒 Maximale Ausgangsleistung (Hard Limit)
            description: Absolute Obergrenze der AC-Ausgangsleistung (z.B. 800 W).
            default: 800
            selector:
              number:
                min: 0
                max: 1200
                unit_of_measurement: W

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ☀️ ÜBERSCHUSS-EINSPEISUNG (Optional - Zone 0)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      surplus_parameter:
        name: "☀️ ÜBERSCHUSS-EINSPEISUNG (Optional - Zone 0):"
        collapsed: true
        input:
          surplus_export_enabled:
            name: ☀️ Überschuss-Einspeisung aktivieren
            description: |
              ✅ EIN: SOC ≥ Schwelle UND (PV > Verbrauch + PV-Hysterese ODER PV = 0) → Output auf Maximum.
              ❌ AUS: Klassische Nulleinspeisung.
            default: false
            selector:
              boolean:

          soc_export_limit:
            name: 🔋 SOC-Schwelle für Überschuss-Einspeisung
            description: |
              Ab diesem SOC (z.B. 90 %) wird bei PV-Überschuss ins Netz eingespeist.
              ⚠️ MUSS echt kleiner sein als das in der Solakon eingestellte max SOC!
            default: 90
            selector:
              number:
                min: 50
                max: 99
                unit_of_measurement: "%"

          surplus_exit_hysteresis:
            name: 🔋 Überschuss-Einspeisung Hysterese (SOC)
            description: |
              SOC muss um diesen Wert unter die Schwelle fallen bevor Zone 0 verlassen wird
              (z.B. 5 % → Austritt bei SOC < 85 % wenn Schwelle = 90 %).
            default: 5
            selector:
              number:
                min: 1
                max: 20
                unit_of_measurement: "%"

          surplus_pv_hysteresis:
            name: ☀️ PV-Überschuss Hysterese
            description: |
              Totband um den Hausverbrauch.
              Eintritt: PV > Verbrauch + Hysterese; Austritt: PV ≤ Verbrauch − Hysterese.
            default: 50
            selector:
              number:
                min: 10
                max: 200
                unit_of_measurement: W

          surplus_state_helper:
            name: ☀️ Surplus-Zustand Speicher (input_boolean - nur für Zone 0)
            description: |
              input_boolean Helper zum persistenten Tracken des Surplus-Zustands.
              ⚠️ Nur erforderlich wenn Überschuss-Einspeisung aktiviert ist.
            default: input_boolean.solakon_surplus_aktiv
            selector:
              entity:
                domain: input_boolean

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚡ AC LADEN (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      ac_charge_parameter:
        name: "⚡ AC LADEN (Optional):"
        description: |
          Laden der Batterie wenn externe Einspeisung erkannt wird (Grid + Output < −Hysterese).
          Aktiv in Zone 1 und Zone 2. SOC-Schutz (Zone 3) bleibt vollständig aktiv.
        collapsed: true
        input:
          ac_charge_enabled:
            name: ⚡ AC Laden aktivieren
            description: |
              ✅ EIN: SOC < Ladeziel UND Modus ≠ '3' UND (Grid + Output) < −Hysterese → Modus 3 (INV Charge PV Priority)
              ❌ AUS: Funktion deaktiviert
            default: false
            selector:
              boolean:

          soc_ac_charge_limit:
            name: 🔋 SOC-Ladeziel (%)
            description: |
              Laden stoppt wenn SOC diesen Wert erreicht.
              ⚠️ Empfohlen: > Zone-1-Schwelle, damit nach dem Laden direkt Zone 1 übernimmt und Nulleinspeisung fährt.
            default: 90
            selector:
              number:
                min: 10
                max: 99
                unit_of_measurement: "%"

          ac_charge_power_limit:
            name: 🔒 Max. Ladeleistung (W)
            description: Absolute Obergrenze der AC-Ladeleistung (z.B. 800 W).
            default: 800
            selector:
              number:
                min: 50
                max: 1200
                unit_of_measurement: W

          ac_charge_hysteresis:
            name: 📏 Hysterese AC Laden (W)
            description: |
              Totband für Ein- und Austritt.
              Eintritt: (Grid + Output) < −Hysterese.
              Austritt: Grid ≥ (Offset + Hysterese) UND Output = 0 W.
              Verhindert Flackern bei wechselnder Einspeisung (z.B. 50 W).
            default: 50
            selector:
              number:
                min: 0
                max: 300
                unit_of_measurement: W

          ac_charge_offset:
            name: ⚡ AC Laden - Nullpunkt-Offset Statisch (Fallback)
            description: |
              Regelziel für Netzleistung im AC-Lade-Modus (z.B. −50 W).
              Negativ = leichte Einspeisung angestrebt, damit die Batterie
              ausschließlich aus PV-Überschuss geladen wird und kein Netzbezug entsteht.
            default: -50
            selector:
              number:
                min: -100
                max: 100
                unit_of_measurement: W

          ac_charge_offset_entity:
            name: ⚡ AC Laden - Dynamischer Nullpunkt-Offset (Optional)
            description: Optionale input_number Entität. Überschreibt statischen Wert.
            default: {}
            selector:
              entity:
                domain: input_number

          ac_charge_state_helper:
            name: ⚡ AC-Lade-Zustand Speicher (input_boolean - nur für AC Laden)
            description: |
              input_boolean Helper zum persistenten Tracken des AC-Lade-Zustands.
              Signalisiert dem PI-Script die invertierte Fehlerberechnung (ac_charge_mode=true).
              ⚠️ Nur erforderlich wenn AC Laden aktiviert ist.
              Einstellungen → Helfer erstellen → Schalter
              - Name: z.B. 'Solakon AC Laden Aktiv'
            default: input_boolean.solakon_ac_laden_aktiv
            selector:
              entity:
                domain: input_boolean

          ac_charge_p_factor:
            name: 🎛️ P-Faktor AC Laden
            description: |
              Proportional-Verstärkung für den AC-Lade-Modus.
              Bei langer Hardware-Flanke (~25 s) klein halten → wenig Überschwingen.
              Empfehlung: 0.3–0.5.
            default: 0.5
            selector:
              number:
                min: 0.1
                max: 5
                step: 0.1

          ac_charge_i_factor:
            name: 🎛️ I-Faktor AC Laden
            description: |
              Integral-Verstärkung für den AC-Lade-Modus.
              Der P-Anteil dämpft bereits — ein zu früh eingesetzter I-Faktor
              führt zu Überschwingen. Startwert: 0 (sicher). Nur erhöhen
              wenn P allein eine bleibende Regelabweichung hinterlässt.
            default: 0
            selector:
              number:
                min: 0
                max: 0.2
                step: 0.01

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 💹 TARIF-ARBITRAGE (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      tariff_parameter:
        name: "💹 TARIF-ARBITRAGE (Optional):"
        description: |
          Laden bei günstigem Strompreis, Entladesperre bei mittlerem Preis.
          ⚠️ Sensor-Einheit und Schwellwerte müssen übereinstimmen (kein Umrechnen im Blueprint).
          ⚠️ Tibber liefert EUR/kWh → Schwellwerte ebenfalls in EUR/kWh angeben.
        collapsed: true
        input:
          tariff_arbitrage_enabled:
            name: 💹 Tarif-Arbitrage aktivieren
            description: |
              ✅ EIN: Laden bei günstigem Preis, Entladesperre bei mittlerem Preis.
              ❌ AUS: Funktion deaktiviert — normale SOC-Zonenlogik.
            default: false
            selector:
              boolean:

          price_sensor:
            name: 💰 Strompreis-Sensor
            description: |
              Sensor mit dem aktuellen Strompreis.
              Einheit muss zu den Schwellwerten passen (z.B. EUR/kWh oder ct/kWh).
              Bei unavailable/unknown: weder Laden noch Sperre.
            default: {}
            selector:
              entity:
                domain: sensor

          cheap_threshold:
            name: 💚 Günstig-Schwelle (Tarif-Laden)
            description: |
              Unterhalb dieser Schwelle wird geladen (z.B. 0.20 EUR/kWh).
              Tarif-Laden aktiv wenn: Preis < Günstig-Schwelle UND SOC < Ladeziel.
            default: 0.20
            selector:
              number:
                min: 0
                max: 1
                step: 0.01

          expensive_threshold:
            name: 🔴 Teuer-Schwelle (Entladesperre)
            description: |
              Unterhalb dieser Schwelle wird die Entladung gesperrt (z.B. 0.25 EUR/kWh).
              Entladesperre aktiv wenn: Günstig-Schwelle ≤ Preis < Teuer-Schwelle.
              ⚠️ Muss > Günstig-Schwelle sein.
            default: 0.25
            selector:
              number:
                min: 0
                max: 1
                step: 0.01

          tariff_soc_charge_target:
            name: 🔋 Tarif-Laden SOC-Ziel (%)
            description: |
              Laden stoppt wenn SOC diesen Wert erreicht.
              ⚠️ Empfohlen: > Zone-1-Schwelle, damit nach dem Tarif-Laden direkt Zone 1 übernimmt.
            default: 90
            selector:
              number:
                min: 10
                max: 99
                unit_of_measurement: "%"

          tariff_charge_power:
            name: ⚡ Tarif-Ladeleistung (W)
            description: |
              Direkt gesetzte Ladeleistung (kein PI-Regler).
              Empfehlung: Maximal verfügbare Ladeleistung nutzen (z.B. 1200 W).
            default: 1200
            selector:
              number:
                min: 50
                max: 1200
                unit_of_measurement: W

          tariff_charge_state_helper:
            name: 💹 Tarif-Lade-Zustand Speicher (input_boolean - nur für Tarif-Arbitrage)
            description: |
              input_boolean Helper zum persistenten Tracken des Tarif-Lade-Zustands.
              ⚠️ Nur erforderlich wenn Tarif-Arbitrage aktiviert ist.
              Einstellungen → Helfer erstellen → Schalter
              - Name: z.B. 'Solakon Tarif-Laden Aktiv'
            default: input_boolean.solakon_tarif_laden_aktiv
            selector:
              entity:
                domain: input_boolean

        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🌙 NACHTABSCHALTUNG (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      night_parameter:
        name: "🌙 NACHTABSCHALTUNG (Optional):"
        collapsed: true
        input:
          night_shutdown_enabled:
            name: 🌙 Nachtabschaltung aktivieren
            description: |
              Deaktiviert Zone 2 nachts automatisch (bei PV < PV-Ladereserve).
              ⚠️ Zone 1 und AC Laden laufen auch nachts weiter!
              ⚠️ Die PV-Schwelle für "Nacht" ist die PV-Ladereserve aus den Zone-2-Parametern.
            default: false
            selector:
              boolean:


mode: single
max_exceeded: silent

variables:
  # ===========================================
  # BLOCK 1: Variablen für Conditions & Modus-Logik
  # (Werden IMMER benötigt)
  # ===========================================

  # Grid / Solar / Actual Power
  grid_power: !input grid_power_sensor
  grid_power_float: "{{ states(grid_power) | float(0) }}"
  solar_power: !input solar_power_sensor
  solar_power_float: "{{ states(solar_power) | float(0) }}"
  actual_power_sensor: !input actual_power_sensor
  actual_power_float: "{{ states(actual_power_sensor) | float(0) }}"

  # Zonen-Schwellwerte
  soc_fast_limit_int: !input soc_fast_limit
  soc_conservation_limit_int: !input soc_conservation_limit

  # Aktuelle Sensorwerte für Conditions
  soc: !input soc_sensor
  timeout_countdown: !input remote_timeout_countdown_sensor
  solakon_mode: !input mode_select
  cycle_active: !input cycle_active_boolean_helper

  # Nachtabschaltung
  night_shutdown_enabled_bool: !input night_shutdown_enabled
  pv_charge_reserve_int: !input pv_charge_reserve

  # Toleranz (wird in Fall G benötigt)
  tolerance_int: !input tolerance

  # Helper-Entitäten
  integral_entity: !input integral_helper
  active_power_entity: !input active_power_number
  discharge_current_entity: !input max_discharge_current_number
  remote_timeout_set_number: !input remote_timeout_set_number

  # Parameter
  discharge_current_max: !input default_discharge_current

  # Surplus
  soc_export_limit_int: !input soc_export_limit
  surplus_exit_hysteresis_int: !input surplus_exit_hysteresis
  surplus_pv_hysteresis_int: !input surplus_pv_hysteresis
  surplus_export_enabled_bool: !input surplus_export_enabled
  surplus_state_entity: !input surplus_state_helper
  surplus_entity_valid: >
    {{ surplus_export_enabled_bool and
       surplus_state_entity is string and
       surplus_state_entity | length > 0 and
       states(surplus_state_entity) not in ['unknown', 'unavailable'] }}

  # AC Laden
  ac_charge_enabled_bool: !input ac_charge_enabled
  soc_ac_charge_limit_int: !input soc_ac_charge_limit
  ac_charge_power_limit_int: !input ac_charge_power_limit
  ac_charge_hysteresis_int: !input ac_charge_hysteresis
  ac_charge_state_entity: !input ac_charge_state_helper
  # Gültig wenn AC Laden aktiviert und Helper verfügbar
  ac_charge_entity_valid: >
    {{ ac_charge_enabled_bool and
       ac_charge_state_entity is string and
       ac_charge_state_entity | length > 0 and
       states(ac_charge_state_entity) not in ['unknown', 'unavailable'] }}
  # AC-Lade-Modus aktiv? Aus persistentem Helper lesen.
  ac_charge_mode_active: "{{ ac_charge_entity_valid | bool(false) and is_state(ac_charge_state_entity, 'on') }}"
  ac_charge_offset_static: !input ac_charge_offset
  ac_charge_offset_entity_id: !input ac_charge_offset_entity
  ac_charge_offset_int: >
    {% if ac_charge_offset_entity_id is string and ac_charge_offset_entity_id | length > 0 and states(ac_charge_offset_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
      {{ states(ac_charge_offset_entity_id) | float(ac_charge_offset_static) }}
    {% else %}
      {{ ac_charge_offset_static }}
    {% endif %}

  # Tarif-Arbitrage
  tariff_arbitrage_enabled_bool: !input tariff_arbitrage_enabled
  price_sensor_entity: !input price_sensor
  tariff_soc_charge_target_int: !input tariff_soc_charge_target
  tariff_charge_power_int: !input tariff_charge_power
  cheap_threshold_float: !input cheap_threshold
  expensive_threshold_float: !input expensive_threshold
  tariff_charge_state_entity: !input tariff_charge_state_helper
  # Gültig wenn Tarif-Arbitrage aktiviert und Helper verfügbar
  tariff_charge_entity_valid: >
    {{ tariff_arbitrage_enabled_bool and
       tariff_charge_state_entity is string and
       tariff_charge_state_entity | length > 0 and
       states(tariff_charge_state_entity) not in ['unknown', 'unavailable'] }}
  # Tarif-Lade-Modus aktiv? Aus persistentem Helper lesen.
  tariff_charge_mode_active: "{{ tariff_charge_entity_valid | bool(false) and is_state(tariff_charge_state_entity, 'on') }}"
  # Preis-Sensor gültig (verfügbar und Tarif-Arbitrage aktiv)?
  price_sensor_valid: >
    {{ tariff_arbitrage_enabled_bool and
       price_sensor_entity is string and
       price_sensor_entity | length > 0 and
       states(price_sensor_entity) not in ['unknown', 'unavailable'] }}
  # Preis aktuell günstig (unter Günstig-Schwelle)?
  price_is_cheap: >
    {{ price_sensor_valid | bool(false) and
       states(price_sensor_entity) | float(999) < cheap_threshold_float | float(0) }}
  # Entladesperre aktiv? (Preis < Teuer-Schwelle UND Sensor valide)
  # Gilt für Zone 1 und Zone 2 — Guards in Falls A und E
  price_discharge_locked: >
    {{ tariff_arbitrage_enabled_bool and
       price_sensor_valid | bool(false) and
       states(price_sensor_entity) | float(999) < expensive_threshold_float | float(0) }}

triggers:
  # Grid-Leistungsänderung
  - trigger: state
    entity_id: !input grid_power_sensor
    id: grid_power_change

  # PV-Leistungsänderung
  - trigger: state
    entity_id: !input solar_power_sensor
    id: solar_power_change

  # SOC überschreitet Zone-1-Schwelle
  - trigger: numeric_state
    entity_id: !input soc_sensor
    above: !input soc_fast_limit
    id: soc_high

  # SOC unterschreitet Zone-3-Schwelle
  - trigger: numeric_state
    entity_id: !input soc_sensor
    below: !input soc_conservation_limit
    id: soc_low

  # Externe Modusänderung
  - trigger: state
    entity_id: !input mode_select
    id: mode_change

actions:
  # -------------------------------------------------------------------------------------------------
  # PRÜFUNG: Check auf kritische Fehler
  # -------------------------------------------------------------------------------------------------
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ soc_fast_limit_int | float(0) <= soc_conservation_limit_int | float(0) }}"
              - condition: template
                value_template: >
                  {{ is_state(soc, 'unknown') or is_state(soc, 'unavailable') or
                     is_state(timeout_countdown, 'unknown') or is_state(timeout_countdown, 'unavailable') }}
        sequence:
          # 1. Fehler ins System-Log schreiben
          - action: system_log.write
            data:
              level: error
              message: "Solakon Fehler: SOC-Limits ungültig oder Entitäten offline. Abbruch."
          # 2. Automation abbrechen
          - stop: "Kritischer Fehler oder ungültige Konfiguration."

  # -------------------------------------------------------------------------------------------------
  # 0. ÜBERSCHUSS-LOGIK (ZONE 0) STATUS-UPDATE
  # -------------------------------------------------------------------------------------------------
  - choose:
      # FALL 0A: ÜBERSCHUSS STARTEN
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) }}"
          - condition: state
            entity_id: !input surplus_state_helper
            state: 'off'
          - condition: template
            value_template: >
              {{ (states(soc) | float(0) >= soc_export_limit_int) and
                 (solar_power_float > (actual_power_float + grid_power_float + surplus_pv_hysteresis_int) or solar_power_float == 0) }}
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "☀️ Zone 0 aktiviert (Überschuss-Einspeisung startet)"
              entity_id: !input solar_power_sensor
          # 2. Surplus-Zustand → on
          - action: input_boolean.turn_on
            target:
              entity_id: !input surplus_state_helper

      # FALL 0B: ÜBERSCHUSS BEENDEN
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) }}"
          - condition: state
            entity_id: !input surplus_state_helper
            state: 'on'
          - condition: template
            value_template: >
              {{ (states(soc) | float(0) < (soc_export_limit_int - surplus_exit_hysteresis_int)) or
                 (solar_power_float <= (actual_power_float + grid_power_float - surplus_pv_hysteresis_int)) }}
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "☁️ Zone 0 deaktiviert (Überschuss-Einspeisung beendet)"
              entity_id: !input solar_power_sensor
          # 2. Surplus-Zustand → off
          - action: input_boolean.turn_off
            target:
              entity_id: !input surplus_state_helper
          # 3. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0

  # -------------------------------------------------------------------------------------------------
  # HAUPT-LOGIK: Modus- und Zyklus-Steuerung
  # Reihenfolge: A, B, C, D (vor GT/G!), GT, HT, TM, G, H, I, E, F
  # -------------------------------------------------------------------------------------------------
  - choose:
      # FALL A: ZONE 1 - Aggressive Entladung START
      # Guard: kein AC/Tarif-Laden aktiv, keine Entladesperre (Preis < teuer)
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (price_discharge_locked | bool(false)) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_fast_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🔋 Zone 1 aktiviert (Aggressive Entladung) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          # 2. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # 3. Zyklus aktivieren
          - action: input_boolean.turn_on
            target:
              entity_id: !input cycle_active_boolean_helper
          # 4. Surplus-Zustand zurücksetzen (nur wenn aktiv)
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          # 5. AC-Lade-Zustand zurücksetzen (nur wenn aktiv)
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          # 6. Modus → '1' (Timer-Toggle 3598↔3599)
          - choose:
              - conditions: "{{ states(solakon_mode) != '1' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'

      # FALL B: ZONE 3 - Sicherheits-STOPP (Zyklus ON)
      # Guard: kein AC/Tarif-Laden aktiv (Laden bei Zone 3 weiterhin erlaubt)
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_conservation_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🛑 Zone 3 aktiviert (Sicherheits-Stopp) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          # 2. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # 3. Zyklus deaktivieren
          - action: input_boolean.turn_off
            target:
              entity_id: !input cycle_active_boolean_helper
          # 4. Surplus-Zustand zurücksetzen (nur wenn aktiv)
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          # 5. AC-Lade-Zustand zurücksetzen (nur wenn aktiv)
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          # 6. Output → 0 W
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          # 7. Modus → '0'
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'

      # FALL C: ZONE 3 - Absicherung (Zyklus OFF, Modus noch aktiv)
      # Guard: kein AC/Tarif-Laden aktiv
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_conservation_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) != '0' }}"
        sequence:
          # 1. Surplus-Zustand zurücksetzen (nur wenn aktiv)
          - choose:
              - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input surplus_state_helper
          # 2. AC-Lade-Zustand zurücksetzen (nur wenn aktiv)
          - choose:
              - conditions: "{{ (ac_charge_entity_valid | bool(false)) and is_state(ac_charge_state_entity, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input ac_charge_state_helper
          # 3. Output → 0 W
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          # 4. Modus → '0'
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'

      # FALL D: Recovery - Modus fiel ab, Zyklus noch aktiv
      # VOR Fall GT/G! Schließt Modus '3' aus (AC/Tarif-Laden laufen ungestört weiter).
      - conditions:
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
          - condition: template
            value_template: "{{ states(solakon_mode) not in ['1', '3'] }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_conservation_limit_int }}"
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Recovery
              message: "🔄 Recovery — Modus-Reaktivierung. SOC: {{ states(soc) }}%, Modus war: {{ states(solakon_mode) }}"
              entity_id: !input mode_select
          # 2. Timer-Toggle (3598↔3599)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          # 3. Modus wiederherstellen: '3' wenn AC Laden ODER Tarif-Laden aktiv, sonst '1'
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ (ac_charge_entity_valid | bool(false) and
                          is_state(ac_charge_state_entity, 'on')) or
                         (tariff_charge_entity_valid | bool(false) and
                          is_state(tariff_charge_state_entity, 'on')) }}
                sequence:
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '3'
            default:
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '1'

      # FALL GT: TARIF-LADEN — Eintritt
      # Guard: Modus ≠ '3' — verhindert Re-Eintritt wenn Tarif-Laden bereits aktiv
      # Guard: NICHT Surplus-Bool = on — Zone 0 blockiert Laden
      - conditions:
          - condition: template
            value_template: "{{ tariff_arbitrage_enabled_bool }}"
          - condition: template
            value_template: "{{ tariff_charge_entity_valid | bool(false) }}"
          - condition: template
            value_template: "{{ price_is_cheap | bool(false) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < tariff_soc_charge_target_int }}"
          - condition: template
            value_template: "{{ states(solakon_mode) != '3' }}"
          - condition: template
            value_template: "{{ not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) }}"
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Tarif-Arbitrage
              message: >
                💹 Tarif-Laden aktiviert
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Preis: {{ states(price_sensor_entity) }}, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          # 2. Tarif-Lade-Zustand → on
          - action: input_boolean.turn_on
            target:
              entity_id: !input tariff_charge_state_helper
          # 3. Timer-Toggle (3598↔3599)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          # 4. Output → Ladeleistung (direkt, kein PI)
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: "{{ tariff_charge_power_int }}"
          # 5. Modus → '3' (INV Charge PV Priority)
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '3'
          - stop: ""

      # FALL HT: TARIF-LADEN BEENDEN
      # Stoppbedingung Preis: NUR wenn Sensor valide — Sensor-Ausfall stoppt NICHT
      # (verhindert Oszillation bei unavailable Preis-Sensor)
      - conditions:
          - condition: template
            value_template: >
              {{ tariff_arbitrage_enabled_bool and
                 states(solakon_mode) == '3' and
                 (tariff_charge_mode_active | bool(false)) }}
          - condition: template
            value_template: >
              {{ states(soc) | float(0) >= tariff_soc_charge_target_int or
                 ((price_sensor_valid | bool(false)) and not (price_is_cheap | bool(false))) }}
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Tarif-Arbitrage
              message: >
                💹 Tarif-Laden beendet
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Preis: {{ states(price_sensor_entity) }}, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          # 2. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # 3. Tarif-Lade-Zustand → off
          - action: input_boolean.turn_off
            target:
              entity_id: !input tariff_charge_state_helper
          # 4. Zone 1 → Modus '1' (Timer-Toggle) | Zone 2 → Disabled + 0 W
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  # 4a. Output → 0 W (vor Moduswechsel)
                  - action: number.set_value
                    target:
                      entity_id: !input active_power_number
                    data:
                      value: 0
                  # 4b. Timer-Toggle (3598↔3599)
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  # 4c. Modus → '1'
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'
                  - stop: ""
            default:
              # 4a. Output → 0 W
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: 0
              # 4b. Modus → '0'
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '0'

      # FALL TM: TARIF DISCHARGE-LOCK — Mittlere Preiszone (günstig ≤ Preis < teuer)
      # Stoppt laufende Entladung (Zone 1 UND Zone 2) wenn Preis zwischen günstig und teuer liegt.
      # Guard: kein AC/Tarif-Laden aktiv, Modus = '1' (Entladung läuft)
      - conditions:
          - condition: template
            value_template: "{{ tariff_arbitrage_enabled_bool }}"
          - condition: template
            value_template: "{{ price_sensor_valid | bool(false) }}"
          - condition: template
            value_template: "{{ price_discharge_locked | bool(false) }}"
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ states(solakon_mode) == '1' }}"
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Tarif-Arbitrage
              message: >
                🔒 Discharge-Lock: Preis {{ states(price_sensor_entity) }} im mittleren Bereich.
                Zone {{ '1' if is_state(cycle_active, 'on') else '2' }} deaktiviert.
              entity_id: !input soc_sensor
          # 2. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # 3. Zyklus deaktivieren wenn Zone 1 aktiv war (verhindert sofortige Recovery durch Fall D)
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: !input cycle_active_boolean_helper
                  # Surplus-Zustand zurücksetzen (nur wenn aktiv)
                  - choose:
                      - conditions: "{{ (surplus_entity_valid | bool(false)) and is_state(surplus_state_entity, 'on') }}"
                        sequence:
                          - action: input_boolean.turn_off
                            target:
                              entity_id: !input surplus_state_helper
          # 4. Output → 0 W
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          # 5. Modus → '0'
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'

      # FALL G: AC LADEN — Eintritt
      # Guard: Modus ≠ '3' — verhindert Re-Eintritt wenn AC Laden bereits aktiv
      # Guard: NICHT Tarif-Lade-Bool = on — Tarif-Laden hat Vorrang
      # Guard: NICHT Surplus-Bool = on — Zone 0 blockiert Laden
      - conditions:
          - condition: template
            value_template: "{{ ac_charge_enabled_bool }}"
          - condition: template
            value_template: "{{ ac_charge_entity_valid | bool(false) }}"
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) < soc_ac_charge_limit_int }}"
          - condition: template
            value_template: "{{ states(solakon_mode) != '3' }}"
          - condition: template
            value_template: "{{ (grid_power_float + actual_power_float) < (-1 * (ac_charge_hysteresis_int | float(0))) }}"
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon AC Laden
              message: >
                ⚡ AC Laden aktiviert
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Grid: {{ grid_power_float }}W, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          # 2. AC-Lade-Zustand → on
          - action: input_boolean.turn_on
            target:
              entity_id: !input ac_charge_state_helper
          # 3. Timer-Toggle (3598↔3599)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599
          # 4. Output → 0 W (PI startet sauber)
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          # 5. Modus → '3' (INV Charge PV Priority)
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '3'
          - stop: ""


      # FALL H: AC LADEN BEENDEN
      - conditions:
          - condition: template
            value_template: "{{ ac_charge_enabled_bool and states(solakon_mode) == '3' }}"
          - condition: template
            value_template: >
              {{ states(soc) | float(0) >= soc_ac_charge_limit_int or
                 (grid_power_float >= (ac_charge_offset_int | float(0) + ac_charge_hysteresis_int | float(0)) and (actual_power_float |float(0) == 0 ))}}
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon AC Laden
              message: >
                ⚡ AC Laden beendet
                (Zone {{ '1' if is_state(cycle_active, 'on') else '2' }})
                — Grid: {{ grid_power_float }}W, SOC: {{ states(soc) }}%
              entity_id: !input soc_sensor
          # 2. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # 3. AC-Lade-Zustand → off
          - action: input_boolean.turn_off
            target:
              entity_id: !input ac_charge_state_helper
          # 4. Zone 1 → Modus '1' (Timer-Toggle) | Zone 2 → Disabled + 0 W
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  # 4a. Output → 0 W (vor Moduswechsel)
                  - action: number.set_value
                    target:
                      entity_id: !input active_power_number
                    data:
                      value: 0
                  # 4b. Timer-Toggle (3598↔3599)
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  # 4c. Modus → '1'
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'
                  - stop: ""
            default:
              # 4a. Output → 0 W
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: 0
              # 4b. Modus → '0'
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '0'

      # FALL I: Safety — Modus '3' aber weder AC Laden noch Tarif-Laden aktiv
      # Fängt externe Modussetzung auf '3' ab wenn kein Laden aktiv oder Helper off
      - conditions:
          - condition: template
            value_template: "{{ states(solakon_mode) == '3' }}"
          - condition: template
            value_template: >
              {{ not ac_charge_enabled_bool or
                 not (ac_charge_entity_valid | bool(false)) or
                 not is_state(ac_charge_state_entity, 'on') }}
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Safety
              message: >
                ⚠️ Fall I — Modus '3' erkannt, AC/Tarif-Laden nicht aktiv. Korrektur.
                Zone {{ '1' if is_state(cycle_active, 'on') else '2' }}
                — SOC: {{ states(soc) }}%
              entity_id: !input mode_select
          # 2. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # 3. Zone 1 → Modus '1' (Timer-Toggle) | Zone 2 → Disabled + 0 W
          - choose:
              - conditions: "{{ is_state(cycle_active, 'on') }}"
                sequence:
                  # 3a. Output → 0 W (vor Moduswechsel)
                  - action: number.set_value
                    target:
                      entity_id: !input active_power_number
                    data:
                      value: 0
                  # 3b. Timer-Toggle (3598↔3599)
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  # 3c. Modus → '1'
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'
                  - stop: ""
            default:
              # 3a. Output → 0 W
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: 0
              # 3b. Modus → '0'
              - action: select.select_option
                target:
                  entity_id: !input mode_select
                data:
                  option: '0'

      # FALL E: ZONE 2 - Batterieschonend START
      # Guard: kein AC/Tarif-Laden aktiv, keine Entladesperre (Preis < teuer)
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (price_discharge_locked | bool(false)) }}"
          - condition: template
            value_template: "{{ states(soc) | float(0) > soc_conservation_limit_int and states(soc) | float(0) <= soc_fast_limit_int }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) == '0' }}"
          - condition: template
            value_template: >
              {{ not night_shutdown_enabled_bool or
                 (states(solar_power) | float(0)) >= pv_charge_reserve_int | float(0) }}
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Zonenwechsel
              message: "🔋 Zone 2 aktiviert (Batterieschonend) - SOC: {{ states(soc) }}%"
              entity_id: !input soc_sensor
          # 2. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # 3. Modus → '1' (Timer-Toggle 3598↔3599)
          - choose:
              - conditions: "{{ states(solakon_mode) != '1' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input remote_timeout_set_number
                            data:
                              value: 3598
                    default:
                      - action: number.set_value
                        target:
                          entity_id: !input remote_timeout_set_number
                        data:
                          value: 3599
                  - action: select.select_option
                    target:
                      entity_id: !input mode_select
                    data:
                      option: '1'

      # FALL F: Nachtabschaltung (Zone 2 bei PV < PV-Ladereserve)
      # Guard: kein AC/Tarif-Laden aktiv (Laden auch nachts erlaubt)
      - conditions:
          - condition: template
            value_template: "{{ not (ac_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ not (tariff_charge_mode_active | bool(false)) }}"
          - condition: template
            value_template: "{{ night_shutdown_enabled_bool }}"
          - condition: template
            value_template: "{{ (states(solar_power) | float(0)) < pv_charge_reserve_int | float(0) }}"
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'off'
          - condition: template
            value_template: "{{ states(solakon_mode) != '0' }}"
        sequence:
          # 1. Logbuch-Eintrag
          - action: logbook.log
            data:
              name: Solakon Nachtmodus
              message: "🌙 Nachtabschaltung aktiviert (Zone 2) - PV: {{ states(solar_power) }}W"
              entity_id: !input solar_power_sensor
          # 2. Integral zurücksetzen
          - action: input_number.set_value
            target:
              entity_id: !input integral_helper
            data:
              value: 0
          # 3. Output → 0 W
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: 0
          # 4. Modus → '0'
          - action: select.select_option
            target:
              entity_id: !input mode_select
            data:
              option: '0'

  # -------------------------------------------------------------------------------------------------
  # PI-GATE: NUR ausführen wenn Modus '1' oder '3' UND (Zone 1 ODER Tag)
  # -------------------------------------------------------------------------------------------------
  - condition: template
    value_template: >
      {{ states(solakon_mode) in ['1', '3'] and
         (is_state(cycle_active, 'on') or
          not night_shutdown_enabled_bool or
          (states(solar_power) | float(0)) >= pv_charge_reserve_int | float(0)) }}

  # ===========================================
  # BLOCK 2: Variablen NUR für PI-Regler
  # ===========================================
  - variables:
      # Frische Sensorwerte zum Zeitpunkt der PI-Berechnung
      grid_power_float: "{{ states(grid_power) | float(0) }}"
      solar_power_float: "{{ states(solar_power) | float(0) }}"

      # Konfiguration
      wait_time_int: !input wait_time
      pi_script: !input PI_regler_script
      max_active_power_limit_int: !input max_active_power_limit
      regulator_factor_float: !input regulator_factor
      ki_factor_float: !input ki_factor
      ac_charge_p_factor_float: !input ac_charge_p_factor
      ac_charge_i_factor_float: !input ac_charge_i_factor
      offset_1_static: !input offset_1
      offset_1_entity_id: !input offset_1_entity
      offset_2_static: !input offset_2
      offset_2_entity_id: !input offset_2_entity

      # Dynamischer Offset
      offset_1_int: >
        {% if offset_1_entity_id is string and offset_1_entity_id | length > 0 and states(offset_1_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(offset_1_entity_id) | float(offset_1_static) }}
        {% else %}
          {{ offset_1_static }}
        {% endif %}
      offset_2_int: >
        {% if offset_2_entity_id is string and offset_2_entity_id | length > 0 and states(offset_2_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(offset_2_entity_id) | float(offset_2_static) }}
        {% else %}
          {{ offset_2_static }}
        {% endif %}

      target_offset: >
        {% if ac_charge_mode_active | bool(false) %}
          {{ ac_charge_offset_int }}
        {% elif is_state(cycle_active, 'on') %}
          {{ offset_1_int }}
        {% else %}
          {{ offset_2_int }}
        {% endif %}

      # PI-Regler-Variablen
      current_active_power: "{{ states(active_power_entity) | float(0) }}"
      integral_old: "{{ states(integral_entity) | float(0) }}"

      # Dynamisches Power-Limit (zonenabhängig)
      # Modus '3' (AC Laden) → Lade-Limit als max_power ans Script
      # Zone 1               → Hard Limit
      # Zone 2               → Max(0, PV - Reserve)
      dynamic_max_power: >
        {% if states(solakon_mode) == '3' %}
          {{ ac_charge_power_limit_int }}
        {% elif is_state(cycle_active, 'on') %}
          {{ max_active_power_limit_int }}
        {% else %}
          {{ [0, solar_power_float - (pv_charge_reserve_int | float(0))] | max }}
        {% endif %}

      # Fehler für Guards (immer in Entlade-Richtung: grid − offset)
      # Absolutwert ist für beide Modi (normal + AC) identisch → grid_error_abs gilt für Toleranzprüfung
      raw_error: "{{ grid_power_float - (target_offset | float(0)) }}"
      grid_error_abs: "{{ (grid_power_float - (target_offset | float(0))) | abs }}"

      # At-Limit Guards — nur für normalen Entlade-Modus relevant
      # Im AC-Modus ist die Fehlerrichtung invertiert, Guards würden PI fälschlich blockieren
      at_max_limit: "{{ raw_error > 0 and current_active_power >= max_active_power_limit_int | float(0) }}"
      at_min_limit: "{{ raw_error < 0 and current_active_power <= 0 }}"


  # SCHRITT 1: Entladestrom setzen
  - choose:
      # SCHRITT 1a: Zone 1 — Max-Wert (nur wenn Surplus NICHT aktiv UND NICHT AC/Tarif-Laden)
      - conditions:
          - condition: state
            entity_id: !input cycle_active_boolean_helper
            state: 'on'
          - condition: template
            value_template: >
              {{ states(solakon_mode) != '3' and
                 not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != discharge_current_max | float(0) | round(2) }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: "{{ discharge_current_max }}"

      # SCHRITT 1b: Zone 0 (Surplus) — Stabilitätspuffer 2 A
      - conditions:
          - condition: template
            value_template: >
              {{ (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != 2 }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: 2

      # SCHRITT 1c: Zone 2 oder AC/Tarif-Laden — 0 A
      - conditions:
          - condition: template
            value_template: >
              {{ (is_state(cycle_active, 'off') or states(solakon_mode) == '3') and
                 not (surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on')) and
                 states(discharge_current_entity) | float(999) | round(2) != 0 }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input max_discharge_current_number
            data:
              value: 0

  # SCHRITT 2: Timeout-Reset (Timer-Toggle 3598↔3599)
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ states(timeout_countdown) | int(9999) < 120 }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(remote_timeout_set_number) | int == 3599 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input remote_timeout_set_number
                    data:
                      value: 3598
            default:
              - action: number.set_value
                target:
                  entity_id: !input remote_timeout_set_number
                data:
                  value: 3599

  # SCHRITT 3: Ausgangsleistung setzen + Integral verwalten
  - choose:
      # ZWEIG A: Zone 0 — Überschuss (Hard Limit + Integral einfrieren)
      - conditions:
          - condition: template
            value_template: "{{ surplus_entity_valid | bool(false) and is_state(surplus_state_entity, 'on') }}"
        sequence:
          - parallel:
              # Output → Hard Limit
              - action: number.set_value
                target:
                  entity_id: !input active_power_number
                data:
                  value: "{{ max_active_power_limit_int }}"
              # Integral einfrieren (unverändert zurückschreiben)
              - action: input_number.set_value
                target:
                  entity_id: !input integral_helper
                data:
                  value: "{{ integral_old }}"
          # Wartezeit
          - delay:
              seconds: "{{ wait_time_int }}"

      # ZWEIG BT: Tarif-Laden — Direkt setzen (kein PI)
      # Output → tariff_charge_power (konstant, unabhängig vom Grid)
      - conditions:
          - condition: template
            value_template: "{{ tariff_charge_mode_active | bool(false) }}"
        sequence:
          # Output → Ladeleistung (direkt, kein PI-Aufruf)
          - action: number.set_value
            target:
              entity_id: !input active_power_number
            data:
              value: "{{ tariff_charge_power_int }}"
          # Wartezeit
          - delay:
              seconds: "{{ wait_time_int }}"

      # ZWEIG B: AC Laden — PI-Script mit ac_charge_mode=true (invertierte Fehlerberechnung)
      # at_max/at_min Guards entfallen: Fehlerrichtung ist im Script invertiert
      - conditions:
          - condition: template
            value_template: "{{ ac_charge_mode_active | bool(false) and grid_error_abs > tolerance_int }}"
        sequence:
          # PI-Script aufrufen (ac_charge_mode=true)
          - action: "{{ pi_script }}"
            data:
              grid_power: !input grid_power_sensor
              current_power: "{{ current_active_power }}"
              target_offset: "{{ target_offset }}"
              max_power: "{{ dynamic_max_power }}"
              tolerance: "{{ tolerance_int }}"
              p_factor: "{{ ac_charge_p_factor_float }}"
              i_factor: "{{ ac_charge_i_factor_float }}"
              integral_entity: !input integral_helper
              output_entity: !input active_power_number
              ac_charge_mode: true
          # Wartezeit
          - delay:
              seconds: "{{ wait_time_int }}"

      # ZWEIG C: Normaler PI-Regler (Zone 1 / Zone 2)
      - conditions:
          - condition: template
            value_template: >
              {{ not (ac_charge_mode_active | bool(false)) and
                 grid_error_abs > tolerance_int and
                 not at_max_limit | bool(false) and
                 not at_min_limit | bool(false) }}
        sequence:
          # PI-Script aufrufen (ac_charge_mode=false)
          - action: "{{ pi_script }}"
            data:
              grid_power: !input grid_power_sensor
              current_power: "{{ current_active_power }}"
              target_offset: "{{ target_offset }}"
              max_power: "{{ dynamic_max_power }}"
              tolerance: "{{ tolerance_int }}"
              p_factor: "{{ regulator_factor_float }}"
              i_factor: "{{ ki_factor_float }}"
              integral_entity: !input integral_helper
              output_entity: !input active_power_number
              ac_charge_mode: false
          # Wartezeit
          - delay:
              seconds: "{{ wait_time_int }}"

    # STANDARD: Integral-Decay (Fehler innerhalb Toleranz oder At-Limit)
    default:
      # Integral-Decay wenn PI nicht aufgerufen wird (Fehler innerhalb Toleranz)
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states(integral_entity) | float(0) | abs > 10 }}"
            sequence:
              # Integral × 0,95 (5% Decay)
              - action: input_number.set_value
                target:
                  entity_id: !input integral_helper
                data:
                  value: "{{ (states(integral_entity) | float(0) * 0.95) | round(2) }}"
