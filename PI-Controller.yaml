blueprint:
  name: PI Controller
  description: >
    A pure calculation script. Expects all entities and values as variables
    passed from an automation.
    ac_charge_mode = true: inverted error calculation for AC Charging (raw_error = target_offset - grid).
    ac_charge_mode = false (default): normal error calculation (raw_error = grid - target_offset).
    error_share (0.0-1.0): scales raw_error to this instance's share. Default = 1.0.
  domain: script
  source_url: https://raw.githubusercontent.com/D4nte85/Solakon-One-Nulleinspeisung-Blueprint-homeassistant/Solakon-ONE-Zero-Export/PI-Controller.yaml

mode: single

fields:
  grid_power:
    name: Grid Power (Watts)
    description: Current value from the grid meter
  current_power:
    name: Current Inverter Output (Watts)
    description: Current output of the inverter
  target_offset:
    name: Setpoint (Watts)
    description: Target grid power
  max_power:
    name: Max Power (Watts)
    description: Inverter limit (hard limit or charge limit)
  tolerance:
    name: Tolerance (Watts)
    description: Deadband within which no correction occurs
  p_factor:
    name: P Factor
  i_factor:
    name: I Factor
  integral_entity:
    name: Integral Helper (ID)
    description: The entity ID of the input_number helper
  output_entity:
    name: Target Entity (ID)
    description: The entity ID of the inverter output power entity
  ac_charge_mode:
    name: AC Charging Active (Bool)
    description: >
      Determines sign direction of base error (before error_share scaling).
      true  = AC Charging: base = target_offset − grid (positive error → increase charge power).
      false = Normal:      base = grid − target_offset (positive error → increase output).
    required: false
    default: false

  error_share:
    name: Error Share (0.0–1.0)
    description: >
      Share of grid error this instance handles (multi-instance operation).
      Leave unset in single-instance operation — default = 1.0 (full error).
    required: false
    default: 1.0

variables:
  grid_float: "{{ states(grid_power) | float(0) }}"
  current_float: "{{ current_power | float(0) }}"
  target_float: "{{ target_offset | float(0) }}"
  max_pwr_float: "{{ max_power | float(800) }}"
  tol_float: "{{ tolerance | float(10) }}"
  p_val: "{{ p_factor | float(1.5) }}"
  i_val: "{{ i_factor | float(0.05) }}"

  # Error direction depending on mode:
  #   Normal:      grid - target  → positive with grid import (increase output)
  #   AC Charging: target - grid  → positive when Grid < setpoint (increase charge power)
  # error_share scales the error to this instance's share (multi-instance).
  raw_error: >
    {% set base = (target_float - grid_float) if ac_charge_mode | bool(false) else (grid_float - target_float) %}
    {{ base * (error_share | float(1.0)) }}
  grid_error_abs: "{{ raw_error | abs }}"

  # Capacity clamping: limits error to actually usable capacity
  error_float: >
    {% if raw_error > 0 %}
      {{ [raw_error, (max_pwr_float - current_float)] | min }}
    {% else %}
      {{ [raw_error, (0 - current_float)] | max }}
    {% endif %}

  integral_old: "{{ states(integral_entity) | float(0) }}"

  # Hardware max of target entity (fallback: max_pwr_float if attribute missing)
  entity_max: "{{ state_attr(output_entity, 'max') | float(max_pwr_float) }}"
  effective_max: "{{ [max_pwr_float, entity_max] | min }}"

  # PI correction and final result
  integral_candidate: "{{ (integral_old + error_float) | float(0) }}"
  power_correction: "{{ (error_float * p_val) + (integral_candidate * i_val) }}"
  new_power: "{{ (current_float + power_correction) | float(0) }}"
  final_power: "{{ new_power | round(0) | clamp(0, effective_max) }}"

  # Anti-windup via back-calculation: integral corrected to the value that exactly
  # produces final_power. Equals integral_candidate when output is not clamped.
  integral_new: >
    {% if i_val != 0 %}
      {{ ((final_power - current_float - error_float * p_val) / i_val) | clamp(-effective_max, effective_max) }}
    {% else %}
      {{ integral_candidate | clamp(-effective_max, effective_max) }}
    {% endif %}

sequence:
  - parallel:
      # 1. Always update integral
      - action: input_number.set_value
        target:
          entity_id: "{{ integral_entity }}"
        data:
          value: "{{ integral_new }}"

      # 2. Send value to the provided entity
      - action: number.set_value
        target:
          entity_id: "{{ output_entity }}"
        data:
          value: "{{ final_power }}"
